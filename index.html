    el.className = 'action-card';
    el.innerHTML = `
      <div class="action-card-icon"><span class="material-icons">${icon}</span></div>
      <div class="action-card-text">
        <div class="action-card-title">${esc(title)}</div>
        <div class="action-card-sub">${esc(sub)}</div>
      </div>
      <span class="material-icons action-card-chevron">chevron_right</span>`;
    return el;
  }

  // Card 1 — Call
  const callCard = makeCard('a', 'phone', 'Call a SNAP Advisor', 'Texas Health & Human Services · 1-855-366-3401');
  callCard.href = 'tel:1-855-366-3401';
  cards.appendChild(callCard);

  // Card 2 — Apply Online
  const applyCard = makeCard('a', 'open_in_new', 'Start Your Application', 'YourTexasBenefits.com');
  applyCard.href = 'https://yourtexasbenefits.com';
  applyCard.target = '_blank';
  applyCard.rel = 'noopener noreferrer';
  cards.appendChild(applyCard);

  // Card 3 — Book Appointment
  const bookCard = makeCard('button', 'calendar_today', 'Meet with a UT Outpost Advisor', 'Schedule a free in-person appointment');
  bookCard.addEventListener('click', () => {
    cards.querySelectorAll('.action-card').forEach(c => { c.style.pointerEvents = 'none'; c.style.opacity = '0.6'; });
    bookCard.style.opacity = '1';
    startBookingFlow();
  });
  cards.appendChild(bookCard);

  wrap.appendChild(cards);
}

// ── Init ─────────────────────────────────────────────────────────────────────
function addGreetingBubble(text) {
  const t = nowTime();
  const wrap = document.createElement('div');
  wrap.className = 'message bot';
  const msgRow = document.createElement('div');
  msgRow.className = 'msg-row';
  msgRow.innerHTML = `
    <div class="avatar">SB</div>
    <div class="bubble">
      <div class="bubble-text"></div>
      <div class="msg-time"><span>${t}</span>${checkSVG('#94a3b8')}</div>
    </div>`;
  // Split on double newlines into paragraphs, no question-splitting logic
  const bubbleText = msgRow.querySelector('.bubble-text');
  const paras = text.split('\n\n');
  paras.forEach((p, i) => {
    const el = document.createElement('p');
    el.textContent = p;
    if (i > 0) el.style.marginTop = '0.5em';
    bubbleText.appendChild(el);
  });
  wrap.appendChild(msgRow);
  chatArea.appendChild(wrap);
  scrollBottom();
}

// ── Summary Card (rendered when user selects "I'll apply later") ───────────────
function renderSummaryBubble() {
  const { wrap, msgRow, bubbleText } = createBotBubble();
  bubbleText.classList.remove('streaming');
  bubbleText.removeAttribute('aria-label');
  msgRow.querySelector('.bubble')?.classList.remove('streaming-bubble');

  // Title
  const title = document.createElement('p');
  title.textContent = 'SNAP Eligibility Summary';
  title.style.fontWeight = '600';
  title.style.color = '#1e293b';
  bubbleText.appendChild(title);

  // Status row
  const statusP = document.createElement('p');
  statusP.style.marginTop = '6px';
  statusP.appendChild(document.createTextNode('Your status: '));
  const statusSpan = document.createElement('span');
  statusSpan.textContent = snapData.eligibilityStatus || 'very likely eligible';
  statusSpan.style.color = '#24872e';
  statusSpan.style.fontWeight = '600';
  statusP.appendChild(statusSpan);
  bubbleText.appendChild(statusP);

  // Bullet list
  const ul = document.createElement('ul');
  ul.style.paddingLeft = '21px';
  ul.style.marginTop = '8px';
  ul.style.display = 'flex';
  ul.style.flexDirection = 'column';
  ul.style.gap = '4px';

  const items = [];
  if (snapData.householdLabel)  items.push(`${snapData.householdLabel} household`);
  if (snapData.incomeLimit)     items.push(`Income below $${snapData.incomeLimit.toLocaleString()}/month limit`);
  if (snapData.exemption)       items.push(snapData.exemption);
  if (snapData.monthlyBenefit)  items.push(`Potential monthly benefit: up to $${snapData.monthlyBenefit}`);

  items.forEach(item => {
    const li = document.createElement('li');
    li.textContent = item;
    li.style.fontSize = '14px';
    li.style.color = '#1e293b';
    ul.appendChild(li);
  });
  bubbleText.appendChild(ul);

  // CTA question
  const question = document.createElement('p');
  question.style.marginTop = '10px';
  question.textContent = 'Would you like me to send this information for you?';
  bubbleText.appendChild(question);

  chatArea.appendChild(wrap);
  scrollBottom();

  // Quick replies
  const qrWrap = document.createElement('div');
  qrWrap.className = 'quick-replies';
  ['Yes, send it to my email', 'No thanks'].forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'qr-btn';
    btn.textContent = opt;
    btn.addEventListener('click', () => {
      qrWrap.querySelectorAll('.qr-btn').forEach(b => b.disabled = true);
      addMessage('user', opt);
      if (opt === 'Yes, send it to my email') renderEmailInput();
      else renderNoThanks();
    });
    qrWrap.appendChild(btn);
  });
  wrap.appendChild(qrWrap);
}

function renderEmailInput() {
  const { wrap, msgRow, bubbleText } = createBotBubble();
  bubbleText.classList.remove('streaming');
  bubbleText.removeAttribute('aria-label');
  msgRow.querySelector('.bubble')?.classList.remove('streaming-bubble');

  const p = document.createElement('p');
  p.textContent = 'What\'s your email address?';
  bubbleText.appendChild(p);

  const row = document.createElement('div');
  row.style.cssText = 'display:flex;gap:8px;margin-top:10px;align-items:center';

  const input = document.createElement('input');
  input.type = 'email';
  input.placeholder = 'your@email.com';
  input.style.cssText = 'flex:1;border:1px solid #e2e8f0;border-radius:8px;padding:8px 12px;font-size:14px;font-family:inherit;outline:none;color:#1e293b';

  const submitBtn = document.createElement('button');
  submitBtn.textContent = 'Send';
  submitBtn.style.cssText = 'background:#1e827d;color:#fff;border:none;border-radius:8px;padding:8px 16px;font-size:14px;font-weight:600;cursor:pointer;white-space:nowrap;font-family:inherit';

  const onSubmit = () => {
    const email = input.value.trim();
    if (!email || !email.includes('@')) {
      input.style.borderColor = '#ef4444';
      return;
    }
    snapData.email = email;
    input.disabled = true;
    submitBtn.disabled = true;
    submitBtn.style.opacity = '0.5';
    renderEmailConfirmation(email);
  };

  submitBtn.addEventListener('click', onSubmit);
  input.addEventListener('keydown', e => { if (e.key === 'Enter') onSubmit(); });
  input.addEventListener('input', () => { input.style.borderColor = '#e2e8f0'; });

  row.appendChild(input);
  row.appendChild(submitBtn);
  bubbleText.appendChild(row);

  chatArea.appendChild(wrap);
  scrollBottom();
  setTimeout(() => input.focus(), 50);
}

function buildEmailSummary() {
  return {
    status:         snapData.eligibilityStatus || 'likely eligible',
    householdSize:  snapData.householdLabel    ? `${snapData.householdLabel} household` : 'N/A',
    incomeLimit:    snapData.incomeLimit       ? `$${Number(snapData.incomeLimit).toLocaleString()}/month limit` : 'N/A',
    exemption:      snapData.exemption         || 'N/A',
    monthlyBenefit: snapData.monthlyBenefit    ? `up to $${snapData.monthlyBenefit}/month` : 'N/A',
  };
}

async function renderEmailConfirmation(email) {
  const { wrap, msgRow, bubbleText } = createBotBubble();
  bubbleText.classList.remove('streaming');
  bubbleText.removeAttribute('aria-label');
  msgRow.querySelector('.bubble')?.classList.remove('streaming-bubble');

  // Show sending state immediately
  const statusP = document.createElement('p');
  statusP.textContent = 'Sending your summary…';
  statusP.style.color = '#64748b';
  bubbleText.appendChild(statusP);
  chatArea.appendChild(wrap);
  scrollBottom();

  try {
    const res = await fetch('/api/send-email', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, summary: buildEmailSummary() }),
    });

    bubbleText.innerHTML = '';
    if (res.ok) {
      const p1 = document.createElement('p');
      p1.textContent = 'Got it! We\'ve saved your summary for reference.';
      const p2 = document.createElement('p');
      p2.style.marginTop = '0.5em';
      p2.textContent = 'You can apply anytime at YourTexasBenefits.com.';
      bubbleText.appendChild(p1);
      bubbleText.appendChild(p2);
    } else {
      const p1 = document.createElement('p');
      p1.textContent = 'Sorry, we couldn\'t send the email right now.';
      const p2 = document.createElement('p');
      p2.style.marginTop = '0.5em';
      p2.textContent = 'You can apply anytime at YourTexasBenefits.com — your situation hasn\'t changed.';
      bubbleText.appendChild(p1);
      bubbleText.appendChild(p2);
    }
  } catch {
    bubbleText.innerHTML = '';
    const p1 = document.createElement('p');
    p1.textContent = 'Sorry, we couldn\'t send the email right now.';
    const p2 = document.createElement('p');
    p2.style.marginTop = '0.5em';
    p2.textContent = 'You can apply anytime at YourTexasBenefits.com — your situation hasn\'t changed.';
    bubbleText.appendChild(p1);
    bubbleText.appendChild(p2);
  }

  scrollBottom();
}

function renderNoThanks() {
  const { wrap, msgRow, bubbleText } = createBotBubble();
  bubbleText.classList.remove('streaming');
  bubbleText.removeAttribute('aria-label');
  msgRow.querySelector('.bubble')?.classList.remove('streaming-bubble');

  bubbleText.innerHTML = '';
  const p1 = document.createElement('p');
  p1.textContent = 'No problem. You can always come back when you\'re ready.';
  const p2 = document.createElement('p');
  p2.style.marginTop = '0.5em';
  p2.textContent = 'Apply at YourTexasBenefits.com anytime — your situation hasn\'t changed.';
  bubbleText.appendChild(p1);
  bubbleText.appendChild(p2);

  chatArea.appendChild(wrap);
  scrollBottom();
}

function startChat() {
  history = [];
  resetSnapData();

  const bubble1 = "Hi! I'm your SNAP Eligibility Assistant, here to help you figure out if you qualify. Feel free to ask about anything you're unsure of.";
  const bubble2 = "To make sure I give you the most accurate information, what state are you currently living in?";

  addGreetingBubble(bubble1);
  history.push({ role: 'assistant', content: bubble1 });

  lockInput(true);
  setTimeout(() => {
    showTyping();
    setTimeout(() => {
      hideTyping();
      addGreetingBubble(bubble2);
      history.push({ role: 'assistant', content: bubble2 });
      lockInput(false);
    }, 600);
  }, 800);
}

msgInput.disabled = false;
startChat();
</script>
