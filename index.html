<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SNAP Benefits</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@500&family=Inter:ital,wght@0,400;0,500;0,600&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    .material-icons { font-size: 24px; line-height: 1; display: block; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #e2e8f0;
      height: 100vh;
      overflow: hidden;
      display: flex;
      justify-content: center;
    }

    .app {
      width: 100%;
      max-width: 480px;
      height: 100vh;
      display: flex;
      flex-direction: column;
      background: #f8fafc;
      box-shadow: 0 0 48px rgba(0,0,0,0.15);
      overflow: hidden;
    }

    /* ─── Header ──────────────────────────────────────── */
    .header {
      background: #ffffff;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
      border-bottom: 1px solid #f1f5f9;
    }
    .header-text { flex: 1; }
    .header-title {
      font-family: 'Roboto Mono', 'Courier New', monospace;
      font-weight: 500;
      font-size: 20px;
      color: #000;
      line-height: 1.2;
    }
    .header-sub {
      font-size: 12px;
      font-weight: 400;
      color: rgba(0,0,0,0.7);
      margin-top: 2px;
      line-height: 1.4;
    }
    .menu-btn {
      background: none;
      border: none;
      cursor: pointer;
      padding: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      border-radius: 8px;
      color: #1e293b;
    }
    .menu-btn:hover { background: #f1f5f9; }

    /* ─── Chat Area ────────────────────────────────────── */
    .chat-area {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 24px;
      scroll-behavior: smooth;
    }

    /* ─── Message Rows ─────────────────────────────────── */
    .message { display: flex; flex-direction: column; width: 100%; }

    /* Bot message */
    .message.bot { align-items: flex-start; }
    .msg-row {
      display: flex;
      gap: 8px;
      align-items: flex-start;
      width: 100%;
    }

    /* Avatar */
    .avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: #d6f0f1;
      color: #1c7a74;
      font-size: 12px;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      letter-spacing: -0.5px;
    }

    /* Bot bubble */
    .message.bot .bubble {
      background: #ffffff;
      border: 1px solid #e2e8f0;
      border-radius: 16px;
      padding: 16px;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .bubble-text {
      font-size: 14px;
      font-weight: 500;
      line-height: 1.4;
      color: #1e293b;
      word-break: break-word;
    }
    .msg-time {
      display: flex;
      align-items: center;
      gap: 4px;
      align-self: flex-end;
      margin-left: auto;
    }
    .msg-time span {
      font-size: 12px;
      font-weight: 500;
      color: #69737c;
      letter-spacing: -0.06px;
      white-space: nowrap;
    }
    .check-icon { display: block; flex-shrink: 0; }

    /* User message */
    .message.user { align-items: flex-end; }
    .message.user .bubble {
      background: #1e827d;
      border-radius: 16px;
      padding: 12px 16px;
      max-width: 78%;
      display: flex;
      flex-direction: row;
      flex-wrap: wrap;
      align-items: flex-end;
      column-gap: 8px;
      row-gap: 2px;
    }
    .message.user .bubble-text { flex: 1 1 auto; }
    .message.user .bubble-text { color: #ffffff; }
    .message.user .msg-time span { color: #aee8e6; }

    /* ─── Quick Replies ────────────────────────────────── */
    .quick-replies {
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding-left: 40px; /* avatar (32) + gap (8) */
      width: 100%;
      margin-top: 8px;
    }
    .qr-btn {
      width: 100%;
      background: #ffffff;
      border: 1px solid #e2e8f0;
      border-radius: 16px;
      height: 44px;
      padding: 0 16px;
      font-family: inherit;
      font-size: 14px;
      font-weight: 600;
      color: #1e827d;
      cursor: pointer;
      text-align: left;
      transition: background 0.15s;
    }
    .qr-btn:hover:not(:disabled) { background: #f0fdfa; }
    .qr-btn:disabled { opacity: 0.45; cursor: not-allowed; }

    /* ─── Typing Indicator ─────────────────────────────── */
    .typing-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .typing-bubble {
      display: flex;
      align-items: center;
      gap: 6px;
      background: #ffffff;
      border: 1px solid #e2e8f0;
      border-radius: 16px;
      padding: 16px;
    }
    .typing-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #94a3b8;
      animation: tdot 1.3s ease-in-out infinite;
    }
    .typing-dot:nth-child(2) { animation-delay: 0.18s; }
    .typing-dot:nth-child(3) { animation-delay: 0.36s; }
    @keyframes tdot {
      0%, 60%, 100% { transform: translateY(0);    opacity: 0.35; }
      30%            { transform: translateY(-5px); opacity: 1;    }
    }

    /* ─── Input Area ───────────────────────────────────── */
    .input-area {
      background: #f8fafc;
      padding: 8px 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      flex-shrink: 0;
    }
    .input-card {
      background: #ffffff;
      border: 1px solid #e2e8f0;
      border-radius: 24px;
      padding: 16px;
      box-shadow: 0 12px 16px -4px rgba(16,24,40,0.08), 0 4px 6px -2px rgba(16,24,40,0.04);
      display: flex;
      flex-direction: column;
      gap: 16px;
      transition: border-color 0.2s;
    }
    .input-card:focus-within {
      border-color: #1E827D;
    }
    .msg-input {
      width: 100%;
      border: none;
      outline: none;
      font-family: inherit;
      font-size: 16px;
      font-weight: 400;
      color: #1e293b;
      background: transparent;
      resize: none;
      min-height: 24px;
      max-height: 120px;
      line-height: 1.4;
      overflow-y: auto;
    }
    .msg-input::placeholder { color: #475569; }
    .msg-input:disabled { opacity: 0.5; }

    .input-actions {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }
    .action-left { display: flex; gap: 8px; align-items: center; flex: 1; min-width: 0; }

    .icon-btn {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: 1px solid #cbd5e1;
      background: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: #64748b;
      flex-shrink: 0;
      transition: background 0.15s;
    }
    .icon-btn:hover { background: #f8fafc; }

    .send-btn {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: #065c58;
      border: none;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
      transition: background 0.2s, opacity 0.2s;
    }
    .send-btn:hover:not(:disabled) { background: #1e827d; }
    .send-btn:disabled { opacity: 0.35; cursor: not-allowed; }

    /* Stop button shown during streaming */
    .send-btn.stop-mode { background: #121212; }
    .send-btn.stop-mode:hover { background: #2a2a2a; }

    /* ── Voice input pill ─────────────────────────────── */
    #attachBtn {
      transition: opacity 150ms cubic-bezier(0.4,0,0.2,1),
                  width 300ms cubic-bezier(0.4,0,0.2,1),
                  margin 300ms cubic-bezier(0.4,0,0.2,1),
                  padding 300ms cubic-bezier(0.4,0,0.2,1);
      flex-shrink: 0;
    }
    #attachBtn.voice-hidden {
      opacity: 0;
      width: 0;
      margin: 0;
      padding: 0;
      pointer-events: none;
      overflow: hidden;
      border: none;
    }
    #micBtn {
      transition: width 300ms cubic-bezier(0.4,0,0.2,1),
                  border-radius 300ms cubic-bezier(0.4,0,0.2,1),
                  padding 300ms cubic-bezier(0.4,0,0.2,1),
                  flex 300ms cubic-bezier(0.4,0,0.2,1);
      overflow: hidden;
      flex-shrink: 0;
      width: 40px;
    }
    #micBtn .mic-icon {
      transition: opacity 150ms cubic-bezier(0.4,0,0.2,1);
      opacity: 1;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #micBtn .voice-content {
      display: flex;
      align-items: center;
      justify-content: space-between;
      overflow: hidden;
      opacity: 0;
      transition: opacity 150ms cubic-bezier(0.4,0,0.2,1);
      pointer-events: none;
      position: absolute;
      left: 12px;
      right: 12px;
    }
    #micBtn {
      position: relative;
      height: 40px;
      box-sizing: border-box;
    }
    /* Active (recording) state */
    #micBtn.recording {
      width: auto;
      border-radius: 120px;
      flex: 1 1 0%;
      min-width: 0;
      padding: 8px 12px;
      height: 40px;
      cursor: default;
      overflow: hidden;
    }
    #micBtn.recording .mic-icon {
      opacity: 0;
      pointer-events: none;
    }
    #micBtn.recording .voice-content {
      opacity: 1;
      pointer-events: auto;
      transition-delay: 150ms;
    }
    /* Voice wave bars */
    .voice-wave {
      display: flex;
      align-items: center;
      gap: 4px;
      height: 18px;
    }
    .vbar {
      width: 2px;
      border-radius: 80px;
      flex-shrink: 0;
    }
    .vbar.active-bar {
      transform-origin: center;
      transition: transform 80ms ease-out, background-color 150ms ease;
    }
    .voice-left {
      display: flex;
      align-items: center;
      gap: 8px;
      flex: 1;
      min-width: 0;
    }
    .voice-stop-label {
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      font-weight: 500;
      color: #000;
      white-space: nowrap;
      cursor: pointer;
    }
    .voice-timer {
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      font-weight: 400;
      color: #000;
      white-space: nowrap;
      flex-shrink: 0;
      font-variant-numeric: tabular-nums;
    }

    /* File preview */
    .file-preview:empty { display: none; }
    .file-preview {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .file-preview-item {
      position: relative;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: #f1f5f9;
      border-radius: 12px;
      padding: 4px 8px;
      font-size: 12px;
      color: #1e293b;
    }
    .file-preview-item img {
      width: 40px;
      height: 40px;
      object-fit: cover;
      border-radius: 8px;
    }
    .file-preview-remove {
      position: absolute;
      top: -6px;
      right: -6px;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: #1e293b;
      color: white;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
    }

    /* Streaming cursor on the active bubble */
    .bubble-text.streaming::after {
      content: '';
      display: inline-block;
      width: 2px;
      height: 1em;
      background: #1e827d;
      margin-left: 2px;
      vertical-align: text-bottom;
      animation: blink 0.7s step-end infinite;
    }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

    /* Message fade-in */
    @keyframes msgIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .message { animation: msgIn 0.2s ease-out both; }

    /* Error bubble */
    .bubble-error {
      background: #fef2f2;
      border-color: #fecaca;
      color: #991b1b;
    }
    .retry-btn {
      margin-top: 8px;
      background: none;
      border: 1px solid #fca5a5;
      border-radius: 8px;
      color: #991b1b;
      font-family: inherit;
      font-size: 12px;
      font-weight: 600;
      padding: 4px 10px;
      cursor: pointer;
    }
    .retry-btn:hover { background: #fee2e2; }

    .privacy-note {
      text-align: center;
      font-size: 12px;
      font-weight: 400;
      color: #757575;
    }

    /* ─── Sources Chip (lives inside the bubble's time row) ── */
    .sources-stack {
      display: flex;
      gap: 4px;
      align-items: center;
      width: 100%;
    }
    .sources-stack .msg-time {
      flex: 1 0 0;
      justify-content: flex-end;
      align-self: auto;
    }
    .sources-chip {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      background: #eef3ef;
      color: #000000;
      border: none;
      border-radius: 32px;
      padding: 4px 8px;
      font-family: inherit;
      font-size: 14px;
      font-weight: 400;
      cursor: pointer;
      flex-shrink: 0;
      transition: background 0.15s;
    }
    .sources-chip:hover { background: #ddeadf; }

    /* ─── Sheet Overlay ────────────────────────────────── */
    .sheet-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 100;
      opacity: 0;
      transition: opacity 0.25s ease;
    }
    .sheet-overlay.open { opacity: 1; }

    /* ─── Bottom Sheet ─────────────────────────────────── */
    .sheet {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%) translateY(100%);
      width: 100%;
      max-width: 480px;
      max-height: 70vh;
      background: #ffffff;
      border-radius: 16px 16px 0 0;
      z-index: 101;
      display: flex;
      flex-direction: column;
      box-shadow: 0 -4px 32px rgba(0,0,0,0.12);
      transition: transform 0.3s cubic-bezier(0.32, 0.72, 0, 1);
    }
    .sheet.open { transform: translateX(-50%) translateY(0); }

    .sheet-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 16px 16px;
      flex-shrink: 0;
    }
    .sheet-title {
      font-size: 18px;
      font-weight: 500;
      color: #1e293b;
      line-height: 1.4;
    }
    .sheet-close {
      width: 24px;
      height: 24px;
      border: none;
      background: none;
      color: #1e293b;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      flex-shrink: 0;
    }
    .sheet-close:hover { opacity: 0.7; }
    .sheet-body {
      overflow-y: auto;
      padding: 0 16px 32px;
      display: flex;
      flex-direction: column;
      flex: 1;
    }

    /* ─── Source Cards ─────────────────────────────────── */
    .source-card {
      display: flex;
      flex-direction: column;
      gap: 7px;
      padding: 12px 0;
      cursor: pointer;
      text-decoration: none;
      color: inherit;
      border-top: 1px solid #e2e8f0;
      transition: opacity 0.15s;
    }
    .source-card:first-child { border-top: none; padding-top: 0; }
    .source-card:hover { opacity: 0.75; }
    .source-card-top {
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .source-favicon {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      flex-shrink: 0;
      object-fit: contain;
    }
    .source-domain {
      font-size: 12px;
      font-weight: 400;
      color: #69737c;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .source-title {
      font-size: 16px;
      font-weight: 500;
      color: #1e293b;
      line-height: 1.4;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .source-context {
      font-size: 12px;
      font-weight: 400;
      color: #69737c;
      line-height: 1.2;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    /* ─── Action Cards (Phase 3) ──────────────────────── */
    .action-cards {
      display: flex;
      flex-direction: column;
      gap: 8px;
      width: 100%;
      padding-left: 40px;
      margin-top: 8px;
    }
    .action-card {
      display: flex;
      align-items: center;
      gap: 12px;
      background: #ffffff;
      border: 1px solid #e2e8f0;
      border-radius: 16px;
      padding: 14px 16px;
      cursor: pointer;
      text-decoration: none;
      color: inherit;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
      transition: background 0.15s, box-shadow 0.15s;
      width: 100%;
      text-align: left;
      font-family: inherit;
    }
    .action-card:hover { background: #f0fdfa; box-shadow: 0 2px 8px rgba(0,0,0,0.10); }
    .action-card:disabled { pointer-events: none; opacity: 0.5; }
    .action-card-icon {
      width: 40px;
      height: 40px;
      border-radius: 12px;
      background: #d6f0f1;
      color: #1c7a74;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .action-card-text { flex: 1; min-width: 0; }
    .action-card-title {
      font-size: 14px;
      font-weight: 600;
      color: #1e293b;
      line-height: 1.3;
    }
    .action-card-sub {
      font-size: 12px;
      font-weight: 400;
      color: #69737c;
      margin-top: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .action-card-chevron { color: #94a3b8; flex-shrink: 0; font-size: 20px !important; }

    /* ─── Booking: Service Select Cards ───────────────── */
    .service-cards {
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding-left: 40px;
      margin-top: 8px;
      width: 100%;
    }
    .service-card {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      background: #ffffff;
      border: 1.5px solid #e2e8f0;
      border-radius: 16px;
      padding: 14px 16px;
      cursor: pointer;
      text-align: left;
      font-family: inherit;
      transition: border-color 0.15s, background 0.15s;
      width: 100%;
    }
    .service-card:hover { border-color: #1e827d; background: #f0fdfa; }
    .service-card.selected { border-color: #1e827d; background: #f0fdfa; }
    .service-card.disabled { pointer-events: none; opacity: 0.5; }
    .service-card-check {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      border: 1.5px solid #cbd5e1;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      margin-top: 1px;
      transition: background 0.15s, border-color 0.15s;
    }
    .service-card.selected .service-card-check {
      background: #1e827d;
      border-color: #1e827d;
    }
    .service-card-body { flex: 1; }
    .service-card-title { font-size: 14px; font-weight: 600; color: #1e293b; line-height: 1.3; }
    .service-card-dur { font-size: 12px; color: #69737c; margin-top: 2px; }

    /* ─── Booking: Inline Input ────────────────────────── */
    .booking-input-wrap {
      padding-left: 40px;
      margin-top: 8px;
      width: 100%;
    }
    .booking-input-label {
      font-size: 12px;
      font-weight: 500;
      color: #69737c;
      margin-bottom: 6px;
    }
    .booking-input-row {
      display: flex;
      gap: 8px;
    }
    .booking-input {
      flex: 1;
      padding: 10px 14px;
      border: 1.5px solid #e2e8f0;
      border-radius: 12px;
      font-family: inherit;
      font-size: 14px;
      color: #1e293b;
      background: #ffffff;
      outline: none;
      transition: border-color 0.2s;
      min-width: 0;
    }
    .booking-input:focus { border-color: #1e827d; }
    .booking-next-btn {
      padding: 10px 18px;
      background: #1e827d;
      color: white;
      border: none;
      border-radius: 12px;
      font-family: inherit;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
      transition: background 0.15s;
    }
    .booking-next-btn:hover { background: #065c58; }
    .booking-next-btn:disabled { background: #94a3b8; cursor: not-allowed; }

    /* ─── Booking: Summary & Complete ─────────────────── */
    .booking-summary {
      background: #ffffff;
      border-left: 4px solid #1B4332;
      border-radius: 0 16px 16px 0;
      padding: 16px;
      margin-top: 8px;
      margin-left: 40px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }
    .booking-summary-title {
      font-size: 14px;
      font-weight: 700;
      color: #1B4332;
      margin-bottom: 12px;
    }
    .booking-summary-row {
      display: flex;
      gap: 8px;
      margin-bottom: 8px;
      font-size: 13px;
      line-height: 1.4;
    }
    .booking-summary-label {

<script>
'use strict';

// ── System Prompt ──────────────────────────────────────────────────────────────
const SYSTEM_PROMPT = `You are a warm, knowledgeable SNAP Benefits Assistant helping people in Texas figure out if they qualify for food assistance. You are like a knowledgeable friend, professional but friendly, clear but not robotic.

TONE:
- Warm and friendly but professional
- Never use filler phrases like "Of course!", "Absolutely!", "Great question!"
- Use natural transitions: "Got it." / "Makes sense." / "That helps."
- Contractions encouraged: you're, don't, let's, that's
- NEVER use em dashes (the \u2014 character). Use commas or new sentences instead.
- Keep responses to 2-3 sentences max
- When response has a statement AND a question, separate with a line break

PLAIN LANGUAGE \u2014 always translate jargon:
- "gross income" \u2192 "all the money you make before taxes"
- "household" \u2192 "everyone you buy and cook food with"
- "half-time" \u2192 "at least half the classes of a full-time student"
- "work-study" \u2192 "a school job program"
- "TANF" \u2192 "TANF (a cash assistance program for families)"
- "SSN" \u2192 "Social Security Number"
- "enrollment verification" \u2192 "a letter from your school confirming you're enrolled"

FORMAT RULES:
- For multiple-choice questions, end your message with OPTIONS:["Option A","Option B"] on its own line.
- Tag phase transitions by starting the message with PHASE:2 or PHASE:3.
- Always end with either a question or OPTIONS:[...] to keep the conversation moving.

SNAP POLICY REFERENCE \u2014 FY2026 (Oct 1, 2025 \u2013 Sept 30, 2026)

INCOME LIMITS (Source: USDA FNS):
Gross monthly income limit (130% FPL):
1=$1,696 | 2=$2,292 | 3=$2,888 | 4=$3,483 | 5=$4,079
Net monthly income limit (100% FPL):
1=$1,305 | 2=$1,763 | 3=$2,221 | 4=$2,680 | 5=$3,138
Asset limit: $3,000 for most | $4,500 if someone is 60+ or has a disability

MAXIMUM MONTHLY BENEFITS (Source: USDA FNS):
1=$298 | 2=$546 | 3=$785 | 4=$994 | 5=$1,183

WORK RULES (Source: USDA FNS):
Adults 18-54 without dependents must work or participate in job training for at least 80 hours/month to receive SNAP beyond 3 months.
Exemptions from work rules:
- Have a dependent child under 18
- Pregnant
- Physically or mentally unfit for work
- Already working 80+ hours/month
- Participating in a work training program
- Age 55 or older
- Age 18-24 and enrolled in school at least half-time

TEXAS-SPECIFIC (Source: Texas HHSC):
- Apply at YourTexasBenefits.com or call 2-1-1
- Applications processed within 30 days
- Expedited SNAP within 7 days if monthly income under $150 and liquid resources under $100

STUDENT RULES (Source: USDA FNS):
- Students enrolled half-time or more in higher education are generally ineligible
- Exemptions: working 20+ hrs/week, work-study offered, dependent child, disability, TANF
- Continuing education, ESL, and workforce training are NOT subject to student rules

UT AUSTIN RESOURCES:
- UT Outpost: https://deanofstudents.utexas.edu/emergency/utoutpost.php
- Student Emergency Services: https://deanofstudents.utexas.edu/emergency
- Central Texas Food Bank: https://www.centraltexasfoodbank.org

CITATION RULES:
- When sharing policy numbers or rules, cite the source inline: "According to [source name](URL), ..."
- For income/benefit data, cite: [USDA FNS](https://www.fns.usda.gov/snap/recipient/eligibility)
- For benefit amounts, cite: [USDA FNS](https://www.fns.usda.gov/snap/allotment/cola)
- For work rules, cite: [USDA FNS](https://www.fns.usda.gov/snap/work-requirements)
- For Texas-specific rules, cite: [Texas HHSC](https://www.hhs.texas.gov/snap)
- For student rules, cite: [USDA FNS Student Rules](https://www.fns.usda.gov/snap/students)
- Never make up policy details

CONVERSATION FLOW:

The greeting is already shown. The user has told you what state they're in. Respond to their state, then proceed.

PHASE 1 \u2014 STUDENT CHECK:

After user answers state:
- Texas \u2192 "Texas participates in SNAP." \u2192 continue to Step 1
- Other US state \u2192 note this tool is optimized for Texas, offer general SNAP guidance \u2192 continue to Step 1
- Outside US \u2192 explain SNAP is US-only, end warmly. STOP.

Step 1 \u2014 Enrollment status:
OPTIONS:["Yes, at least half-time","No / less than half-time"]
- Less than half-time \u2192 "Student rules don't apply to you." \u2192 Set path = NON_STUDENT \u2192 go to PHASE 2
- Half-time or more \u2192 go to Step 2

Step 2 \u2014 Program type:
OPTIONS:["Degree program (BA, BS, MS, PhD, etc.)","Vocational or trade school","Continuing ed, ESL, or workforce training"]
- Continuing ed / ESL / workforce \u2192 "You're not subject to student rules." \u2192 Set path = NON_STUDENT \u2192 go to PHASE 2
- Degree or vocational \u2192 go to Step 3

Step 3 \u2014 Meal plan:
OPTIONS:["Yes, I have a school meal plan","No meal plan"]
- No meal plan \u2192 Set path = STUDENT_EXEMPT \u2192 go to PHASE 2
- Yes meal plan \u2192 go to Step 4

Step 4 \u2014 Exemption check:
OPTIONS:["I work 20+ hours per week","My school offers work-study","I have a dependent child","I have a documented disability","I receive TANF","None of these apply"]
- None \u2192 Explain meal plan blocks eligibility. Suggest UT Outpost, Central Texas Food Bank, Student Emergency Services. End warmly. STOP.
- Any other \u2192 "That exemption qualifies you to move forward." \u2192 Set path = STUDENT_EXEMPT \u2192 go to PHASE 2

PHASE 2 \u2014 INCOME SNAPSHOT:
Tag this message with PHASE:2

Step 5 \u2014 Household size:
OPTIONS:["Just me (1 person)","2 people","3 people","4 people","5 or more people"]

Step 6 \u2014 Income check:
Share their gross monthly income limit clearly, then ask:
FY2026 limits: 1=$1,696 | 2=$2,292 | 3=$2,888 | 4=$3,483 | 5+=$4,079
OPTIONS:["Below that limit","Around that limit","Clearly above that limit"]

- Clearly above \u2192 Explain over income limit. Suggest UT Outpost, Central Texas Food Bank, campus emergency aid. End warmly. STOP.

- Below or around AND path = STUDENT_EXEMPT:
  \u2192 "You're very likely eligible for SNAP!" Give estimated max benefit.
  \u2192 Skip Work Rules check \u2192 go to PHASE 3

- Below or around AND path = NON_STUDENT:
  \u2192 Go to Step 7 (Work Rules check)

Step 7 \u2014 Work Rules check (NON_STUDENT path only):
"One more thing, SNAP has a work requirement for some adults. Do any of these apply to you?"
OPTIONS:["I work or volunteer 80+ hours/month","I have a child under 18","I'm in a job training program","I'm 55 or older","I'm a student enrolled at least half-time","None of these apply"]
- None \u2192 Explain work requirement makes them ineligible for now. Suggest campus resources and food bank. End warmly. STOP.
- Any other \u2192 "You meet an exemption from the work requirement." \u2192 "You're very likely eligible for SNAP!" Give estimated max benefit. \u2192 go to PHASE 3

PHASE 3 \u2014 NEXT STEPS:
Tag this message with PHASE:3

Step 8 \u2014 Documents needed:
Tell them what they'll need (brief, encouraging):
- A letter from your school confirming enrollment (if applicable)
- Proof of income (pay stub or financial aid award letter)
- Your Social Security Number

Step 9 \u2014 Next action:
OPTIONS:["Start my application now","I need help applying","Not right now"]
- Start now \u2192 Direct to YourTexasBenefits.com. Note it takes ~30 minutes. Offer to save a summary they can reference.
- Need help \u2192 Share 1-855-366-3401 and mention UT Outpost can walk them through it in person. Show booking flow for UT Outpost appointment.
- Not right now \u2192 Validate warmly. Offer to send a reminder to their email so they can come back when ready. Ask for their email address.

Always end with warmth. Remind them SNAP exists to help, there is no shame in applying.`;

// ── State ──────────────────────────────────────────────────────────────────────
let history     = [];
let loading     = false;
let abortCtrl   = null;   // AbortController for the active stream

// ── DOM refs ───────────────────────────────────────────────────────────────────
const chatArea    = document.getElementById('chatArea');
const msgInput    = document.getElementById('msgInput');
const sendBtn     = document.getElementById('sendBtn');
const iconSend    = document.getElementById('iconSend');
const iconStop    = document.getElementById('iconStop');
const sheetOverlay = document.getElementById('sheetOverlay');
const sourceSheet  = document.getElementById('sourceSheet');
const sheetBody    = document.getElementById('sheetBody');
const sheetClose   = document.getElementById('sheetClose');
const attachBtn    = document.getElementById('attachBtn');
const micBtn       = document.getElementById('micBtn');
const fileInput    = document.getElementById('fileInput');
const filePreview  = document.getElementById('filePreview');

// ── Attachment State ──────────────────────────────────────────────────────────
let pendingFile = null; // { type, media_type, data, name, previewUrl }

function setPhase() {}

// ── Response Parsing ───────────────────────────────────────────────────────────
function parseResponse(raw) {
  let text = raw.trim();
  let phase = null;
  let options = [];

  // PHASE tag at start
  const phaseM = text.match(/^PHASE:(\d)\s*\n?/);
  if (phaseM) {
    phase = parseInt(phaseM[1]);
    text  = text.slice(phaseM[0].length).trim();
  }

  // Strip any stray phase labels the model may include in the visible text
  text = text.replace(/^PHASE:\d\s*\n?/gim, '').trim();
  text = text.replace(/\bPhase\s+\d\b\s*[—\-–]?\s*/gi, '').trim();

  // OPTIONS tag — strip citation links from a scratch copy first so a trailing
  // [Text](url) citation on the same or next line doesn't break the match.
  const textNoCitations = text.replace(/\s*\[[^\]]+\]\(https?:\/\/[^\)\s]+\)/g, '');
  const optM = textNoCitations.match(/OPTIONS:\[(.+?)\]\s*$/m);
  if (optM) {
    try {
      options = JSON.parse('[' + optM[1] + ']');
    } catch {
      options = optM[1]
        .split(/",\s*"/)
        .map(s => s.replace(/^"|"$/g, '').trim())
        .filter(Boolean);
    }
    // Remove the OPTIONS token and anything trailing on that line (e.g. a citation)
    text = text.replace(/\n?OPTIONS:\[.+?\][^\n]*$/m, '').trim();
  }

  return { phase, options, text };
}

// Split text into (statement paragraph, question paragraph) for single-bubble rendering.
// Returns { part1, part2 } if both parts exist, otherwise null.
function splitAtQuestion(text) {
  const marked = text.replace(/([.!?])\s+/g, '$1\x00');
  const sentences = marked.split('\x00').map(s => s.trim()).filter(Boolean);
  if (sentences.length < 2) return null;

  let lastQIdx = -1;
  for (let i = sentences.length - 1; i >= 0; i--) {
    if (sentences[i].endsWith('?')) { lastQIdx = i; break; }
  }
  if (lastQIdx <= 0) return null;

  const part1 = sentences.slice(0, lastQIdx).join(' ').trim();
  const part2 = sentences.slice(lastQIdx).join(' ').trim();
  if (!part1 || !part2) return null;
  return { part1, part2 };
}

// Attach quick-reply buttons or action cards to a message wrap element.
function attachOptions(wrap, options, phase) {
  if (phase === 3 && options.length > 0) {
    renderActionCards(wrap);
  } else if (options.length > 0) {
    const qrWrap = document.createElement('div');
    qrWrap.className = 'quick-replies';
    qrWrap.setAttribute('role', 'group');
    qrWrap.setAttribute('aria-label', 'Reply options');
    options.forEach(opt => {
      const btn = document.createElement('button');
      btn.className = 'qr-btn';
      btn.textContent = opt;
      btn.addEventListener('click', () => {
        qrWrap.querySelectorAll('.qr-btn').forEach(b => b.disabled = true);
        handleUserMessage(opt);
      });
      qrWrap.appendChild(btn);
    });
    wrap.appendChild(qrWrap);
  }
}

// Attach inline source citations chip to a bubble if the raw text has links.
function attachCitations(raw, wrap, msgRow) {
  if (!hasCitations(raw)) return;
  const citSources = parseCitations(raw);
  if (citSources.length === 0) return;
  const bubble = msgRow.querySelector('.bubble');
  const timeEl  = bubble.querySelector('.msg-time');
  const stack = document.createElement('div');
  stack.className = 'sources-stack';
  stack.appendChild(buildSourcesChip(citSources));
  stack.appendChild(timeEl);
  bubble.appendChild(stack);
}

// ── Citation Parsing ───────────────────────────────────────────────────────────
function stripMarkdownLinks(text) {
  return text.replace(/\s*\[([^\]]+)\]\(https?:\/\/[^\)\s]+\)/g, '');
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function extractDomain(url) {
  try { return new URL(url).hostname.replace(/^www\./, ''); } catch { return url; }
}

function extractContext(raw, url) {
  const escaped = url.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  const m = raw.match(new RegExp('.{0,160}' + escaped + '.{0,160}'));
  if (!m) return '';
  return stripMarkdownLinks(m[0]).trim();
}

function parseCitations(raw) {
  const sources = [];
  const seen = new Set();
  const re = /\[([^\]]+)\]\((https?:\/\/[^\)\s]+)\)/g;
  let m;
  while ((m = re.exec(raw)) !== null) {
    const [, title, url] = m;
    if (seen.has(url)) continue;
    seen.add(url);
    sources.push({ url, title: title.trim(), domain: extractDomain(url), context: extractContext(raw, url) });
  }
  return sources;
}

function hasCitations(raw) {
  return /According to/i.test(raw) || /\[[^\]]+\]\(https?:\/\/[^\)\s]+\)/.test(raw);
}

function buildSourcesChip(sources) {
  const btn = document.createElement('button');
  btn.className = 'sources-chip';
  btn.innerHTML = `Sources<span class="material-icons" style="font-size:16px;line-height:1;display:inline-block;vertical-align:middle">keyboard_arrow_down</span>`;
  btn.addEventListener('click', () => openSheet(sources));
  return btn;
}

// ── Sources Sheet ──────────────────────────────────────────────────────────────
function openSheet(sources) {
  document.getElementById('sheetTitle').textContent = `${sources.length} source${sources.length !== 1 ? 's' : ''}`;
  sheetBody.innerHTML = '';
  sources.forEach(src => {
    const a = document.createElement('a');
    a.className = 'source-card';
    a.href = src.url;
    a.target = '_blank';
    a.rel = 'noopener noreferrer';
    a.innerHTML = `
      <div class="source-card-top">
        <img class="source-favicon" src="https://www.google.com/s2/favicons?domain=${encodeURIComponent(src.domain)}&sz=32" alt="" aria-hidden="true">
        <span class="source-domain">${esc(src.domain)}</span>
      </div>
      <div class="source-title">${esc(src.title)}</div>
      ${src.context ? `<div class="source-context">${esc(src.context)}</div>` : ''}`;
    sheetBody.appendChild(a);
  });
  sheetOverlay.style.display = 'block';
  sourceSheet.setAttribute('aria-hidden', 'false');
  requestAnimationFrame(() => {
    sheetOverlay.classList.add('open');
    sourceSheet.classList.add('open');
  });
}

function closeSheet() {
  sheetOverlay.classList.remove('open');
  sourceSheet.classList.remove('open');
  setTimeout(() => {
    sheetOverlay.style.display = 'none';
    sourceSheet.setAttribute('aria-hidden', 'true');
  }, 300);
}

// ── Render Helpers ─────────────────────────────────────────────────────────────
function nowTime() {
  const d = new Date();
  return `${d.getHours()}:${String(d.getMinutes()).padStart(2, '0')}`;
}

const checkSVG = (color) => `<span class="material-icons check-icon" style="font-size:16px;color:${color}">done_all</span>`;

function addMessage(role, text, options = []) {
  const t = nowTime();
  const wrap = document.createElement('div');
  wrap.className = `message ${role}`;

  if (role === 'bot') {
    const msgRow = document.createElement('div');
    msgRow.className = 'msg-row';
    msgRow.innerHTML = `
      <div class="avatar">SB</div>
      <div class="bubble">
        <p class="bubble-text"></p>
        <div class="msg-time">
          <span>${t}</span>
          ${checkSVG('#94a3b8')}
        </div>
      </div>`;
    const bubbleTextEl = msgRow.querySelector('.bubble-text');
    const paras = text.split('\n\n');
    if (paras.length > 1) {
      paras.forEach((p, i) => {
        const el = document.createElement('p');
        el.textContent = p;
        if (i > 0) el.style.marginTop = '0.5em';
        bubbleTextEl.appendChild(el);
      });
    } else {
      bubbleTextEl.textContent = text;
    }
    wrap.appendChild(msgRow);

    if (options.length > 0) {
      const qrWrap = document.createElement('div');
      qrWrap.className = 'quick-replies';
      options.forEach(opt => {
        const btn = document.createElement('button');
        btn.className   = 'qr-btn';
        btn.textContent = opt;
        btn.addEventListener('click', () => {
          qrWrap.querySelectorAll('.qr-btn').forEach(b => b.disabled = true);
          handleUserMessage(opt);
        });
        qrWrap.appendChild(btn);
      });
      wrap.appendChild(qrWrap);
    }
  } else {
    wrap.innerHTML = `
      <div class="bubble">
        <p class="bubble-text"></p>
        <div class="msg-time">
          <span>${t}</span>
          ${checkSVG('#aee8e6')}
        </div>
      </div>`;
    wrap.querySelector('.bubble-text').textContent = text;
  }

  chatArea.appendChild(wrap);
  scrollBottom();
}

function showTyping() {
  const wrap = document.createElement('div');
  wrap.className = 'typing-wrap';
  wrap.id = 'typing';
  wrap.innerHTML = `
    <div class="avatar">SB</div>
    <div class="typing-bubble">
      <div class="typing-dot"></div>
      <div class="typing-dot"></div>
      <div class="typing-dot"></div>
    </div>`;
  chatArea.appendChild(wrap);
  scrollBottom();
}

function hideTyping() {
  const el = document.getElementById('typing');
  if (el) el.remove();
}

// ── Smart auto-scroll ──────────────────────────────────────────────────────────
// Only auto-scroll if the user hasn't manually scrolled up
function isNearBottom() {
  return chatArea.scrollHeight - chatArea.scrollTop - chatArea.clientHeight < 80;
}
function scrollBottom() {
  chatArea.scrollTop = chatArea.scrollHeight;
}
function maybeScroll() {
  if (isNearBottom()) scrollBottom();
}

// ── Stop button toggle ─────────────────────────────────────────────────────────
function setStopMode(on) {
  if (on) {
    sendBtn.classList.add('stop-mode');
    sendBtn.setAttribute('aria-label', 'Stop generating');
    sendBtn.disabled = false;
    iconSend.style.display = 'none';
    iconStop.style.display = 'block';
  } else {
    sendBtn.classList.remove('stop-mode');
    sendBtn.setAttribute('aria-label', 'Send message');
    iconSend.style.display = 'block';
    iconStop.style.display = 'none';
  }
}

// ── Claude API Call (streaming) ────────────────────────────────────────────────
function createBotBubble() {
  const t = nowTime();
  const wrap = document.createElement('div');
  wrap.className = 'message bot';
  wrap.setAttribute('aria-atomic', 'false');
  const msgRow = document.createElement('div');
  msgRow.className = 'msg-row';
  msgRow.innerHTML = `
    <div class="avatar" aria-hidden="true">SB</div>
    <div class="bubble">
      <p class="bubble-text streaming" aria-label="Assistant is typing"></p>
      <div class="msg-time" aria-hidden="true">
        <span>${t}</span>
        ${checkSVG('#94a3b8')}
      </div>
    </div>`;
  wrap.appendChild(msgRow);
  return { wrap, msgRow, bubbleText: msgRow.querySelector('.bubble-text') };
}

function updateBubbleText(bubbleText, raw) {
  bubbleText.textContent = stripMarkdownLinks(raw);
}

function finalizeMessage(wrap, msgRow, bubbleText, raw) {
  bubbleText.classList.remove('streaming');
  bubbleText.removeAttribute('aria-label');

  const { phase, options, text } = parseResponse(raw);
  if (phase) setPhase(phase);

  function done() {
    loading = false;
    setStopMode(false);
    lockInput(false);
    abortCtrl = null;
  }

  // Render as a single bubble. If there's a statement + question, separate with
  // a blank line inside the bubble (two <p> elements) rather than two bubbles.
  const split = splitAtQuestion(text);
  if (split) {
    bubbleText.innerHTML = '';
    const p1 = document.createElement('p');
    p1.textContent = stripMarkdownLinks(split.part1);
    const p2 = document.createElement('p');
    p2.style.marginTop = '0.5em';
    p2.textContent = stripMarkdownLinks(split.part2);
    bubbleText.appendChild(p1);
    bubbleText.appendChild(p2);
  } else {
    bubbleText.textContent = stripMarkdownLinks(text);
  }

  attachOptions(wrap, options, phase);
  attachCitations(raw, wrap, msgRow);
  scrollBottom();
  done();
}

async function callAPI() {
  if (abortCtrl) abortCtrl.abort();
  abortCtrl = new AbortController();

  loading = true;
  lockInput(true);
  setStopMode(true);
  showTyping();

  const { wrap, msgRow, bubbleText } = createBotBubble();
  let raw        = '';
  let firstChunk = true;
  let revealed   = 0;
  let streamDone = false;
  let rafId      = null;

  // Typewriter render loop — reveals characters at a smooth rate
  function renderTick() {
    if (revealed < raw.length) {
      const backlog = raw.length - revealed;
      const step = Math.max(2, Math.ceil(backlog * 0.15));
      revealed = Math.min(revealed + step, raw.length);
      bubbleText.textContent = stripMarkdownLinks(raw.slice(0, revealed));
      scrollBottom();
    }
    if (!streamDone || revealed < raw.length) {
      rafId = requestAnimationFrame(renderTick);
    } else {
      rafId = null;
      history.push({ role: 'assistant', content: raw });
      finalizeMessage(wrap, msgRow, bubbleText, raw);
    }
  }

  try {
    const response = await fetch('/api/chat', {
      method: 'POST',
      signal: abortCtrl.signal,
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ system: SYSTEM_PROMPT, messages: history }),
    });

    if (!response.ok) {
      let msg = `HTTP ${response.status}`;
      try { msg = (await response.json())?.error?.message || msg; } catch {}
      throw new Error(msg);
    }

    const reader  = response.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;

      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop(); // keep incomplete line in buffer

      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        const data = line.slice(6).trim();
        if (data === '[DONE]') continue;

        try {
          const parsed = JSON.parse(data);

          if (parsed.type === 'content_block_delta' && parsed.delta?.type === 'text_delta') {
            const token = parsed.delta.text;
            if (!token) continue;

            if (firstChunk) {
              hideTyping();
              chatArea.appendChild(wrap);
              scrollBottom();
              firstChunk = false;
              rafId = requestAnimationFrame(renderTick);
            }

            raw += token;
          }

          if (parsed.type === 'message_stop') {
            streamDone = true;
          }
        } catch (e) { /* skip malformed chunks */ }
      }
    }

    // If stream ended without message_stop
    if (!streamDone) {
      streamDone = true;
      if (firstChunk) {
        hideTyping();
        loading = false;
        setStopMode(false);
        lockInput(false);
        abortCtrl = null;
      }
    }

  } catch (err) {
    if (rafId) cancelAnimationFrame(rafId);

    if (err.name === 'AbortError') {
      // User hit Stop — flush remaining text and finalize
      streamDone = true;
      if (raw) {
        revealed = raw.length;
        bubbleText.textContent = stripMarkdownLinks(raw);
        history.push({ role: 'assistant', content: raw });
        finalizeMessage(wrap, msgRow, bubbleText, raw);
      } else {
        hideTyping();
        loading = false;
        setStopMode(false);
        lockInput(false);
        abortCtrl = null;
      }
    } else {
      hideTyping();
      const errWrap = document.createElement('div');
      errWrap.className = 'message bot';
      errWrap.innerHTML = `
        <div class="msg-row">
          <div class="avatar" aria-hidden="true">SB</div>
          <div class="bubble bubble-error" role="alert">
            <p class="bubble-text">Something went wrong: ${err.message}</p>
            <button class="retry-btn">Try again</button>
          </div>
        </div>`;
      errWrap.querySelector('.retry-btn').addEventListener('click', () => {
        errWrap.remove();
        callAPI();
      });
      chatArea.appendChild(errWrap);
      scrollBottom();
      loading = false;
      setStopMode(false);
      lockInput(false);
      abortCtrl = null;
    }
  }
}

async function handleUserMessage(text) {
  if (loading) return;

  if (bookingState) {
    addMessage('user', text);
    handleBookingInput(text);
    return;
  }

  addMessage('user', text);

  if (pendingFile) {
    const content = [
      { type: pendingFile.type, source: { type: 'base64', media_type: pendingFile.media_type, data: pendingFile.data } },
      { type: 'text', text: text || '(attached file)' }
    ];
    history.push({ role: 'user', content });
    pendingFile = null;
    renderFilePreview();
  } else {
    history.push({ role: 'user', content: text });
  }

  await callAPI();
}

// ── Voice Input (Web Speech API + Web Audio API) ───────────────────────────────
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
const voiceStopBtn = document.getElementById('voiceStopBtn');
const voiceTimer   = document.getElementById('voiceTimer');

if (SpeechRecognition) {
  const recognition = new SpeechRecognition();
  recognition.lang = 'en-US';
  recognition.interimResults = true;
  recognition.continuous = false;

  let isRecording   = false;
  let timerInterval = null;
  let timerSeconds  = 0;

  // Web Audio API state
  let audioCtx      = null;
  let analyser      = null;
  let micStream     = null;
  let animRafId     = null;
  const dataArray   = new Uint8Array(256);

  // Active bar elements (bars 2, 3, 4 — 0-indexed: 1, 2, 3)
  const voiceBars = micBtn.querySelectorAll('.vbar');
  const activeBars = [voiceBars[1], voiceBars[2], voiceBars[3]];
  const multipliers = [1.0, 0.8, 0.6];

  function startTimer() {
    timerSeconds = 0;
    voiceTimer.textContent = '0:00';
    timerInterval = setInterval(() => {
      timerSeconds++;
      const m = Math.floor(timerSeconds / 60);
      const s = String(timerSeconds % 60).padStart(2, '0');
      voiceTimer.textContent = `${m}:${s}`;
    }, 1000);
  }

  function stopTimer() {
    clearInterval(timerInterval);
    timerInterval = null;
    timerSeconds  = 0;
    voiceTimer.textContent = '0:00';
  }

  function resetBars() {
    activeBars.forEach(bar => {
      bar.style.transform = 'scaleY(0.3)';
      bar.style.backgroundColor = '#d9d9d9';
    });
  }

  function animateBars() {
    if (!analyser) return;
    analyser.getByteFrequencyData(dataArray);

    // Average the lower frequency bins for a voice-appropriate reading
    let sum = 0;
    const binCount = 32;
    for (let i = 0; i < binCount; i++) sum += dataArray[i];
    const avg = sum / binCount;

    const SILENCE_THRESHOLD = 10;
    if (avg < SILENCE_THRESHOLD) {
      resetBars();
    } else {
      // Map avg (0-255) to scale (0.3-1.0)
      const scale = 0.3 + (avg / 255) * 0.7;
      activeBars.forEach((bar, i) => {
        const barScale = Math.min(scale * multipliers[i], 1.0);
        bar.style.transform = `scaleY(${Math.max(barScale, 0.3)})`;
        bar.style.backgroundColor = '#1c7a74';
      });
    }

    animRafId = requestAnimationFrame(animateBars);
  }

  async function startAudio() {
    try {
      micStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
      audioCtx  = new (window.AudioContext || window.webkitAudioContext)();
      analyser  = audioCtx.createAnalyser();
      analyser.fftSize = 512;
      analyser.smoothingTimeConstant = 0.6;
      const source = audioCtx.createMediaStreamSource(micStream);
      source.connect(analyser);
      animateBars();
    } catch (e) {
      // Microphone permission denied — bars stay static, recognition still works
    }
  }

  function stopAudio() {
    if (animRafId) { cancelAnimationFrame(animRafId); animRafId = null; }
    if (micStream) { micStream.getTracks().forEach(t => t.stop()); micStream = null; }
    if (audioCtx)  { audioCtx.close(); audioCtx = null; }
    analyser = null;
    resetBars();
  }

  function enterVoiceMode() {
    micBtn.setAttribute('aria-label', 'Stop recording');
    // Hide attach button, then expand pill
    attachBtn.classList.add('voice-hidden');
    micBtn.classList.add('recording');
    startTimer();
    startAudio();
  }

  function exitVoiceMode() {
    micBtn.classList.remove('recording');
    micBtn.setAttribute('aria-label', 'Voice input');
    stopTimer();
    stopAudio();
    // Fade attach button back in after pill shrinks
    setTimeout(() => {
      attachBtn.classList.remove('voice-hidden');
    }, 200);
    // Fade transcript in
    msgInput.style.opacity = '0';
    requestAnimationFrame(() => {
      msgInput.style.transition = 'opacity 200ms';
      msgInput.style.opacity = '1';
      setTimeout(() => { msgInput.style.transition = ''; }, 250);
    });
  }

  micBtn.addEventListener('click', () => {
    if (isRecording) { recognition.stop(); return; }
    recognition.start();
  });

  voiceStopBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    if (isRecording) recognition.stop();
  });

  recognition.addEventListener('start', () => {
    isRecording = true;
    enterVoiceMode();
  });

  recognition.addEventListener('result', (e) => {
    msgInput.value = Array.from(e.results).map(r => r[0].transcript).join('');
    resizeTextarea();
  });

  recognition.addEventListener('end', () => {
    isRecording = false;
    exitVoiceMode();
  });

  recognition.addEventListener('error', () => {
    isRecording = false;
    exitVoiceMode();
  });
} else {
  micBtn.style.display = 'none';
}

// Get next 7 weekdays from today
function getWeekdays() {
  const days = [];
  const now = new Date();
  let offset = 1;
  while (days.length < 7) {
    const d = new Date(now);
    d.setDate(now.getDate() + offset);
    if (d.getDay() !== 0 && d.getDay() !== 6) {
      days.push(d.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' }));
    }
    offset++;
  }
  return days;
}

    helper.textContent = 'Use the info above to complete your booking on UT Outpost\'s page.';
    wrap.appendChild(helper);

    bookingState = null;
  });
}

function startChat() {
  history = [];
  const greeting = "Hi! I'm your SNAP Benefits Assistant. I'm here to help you understand the application process and figure out if you qualify.\n\nTo make sure I give you the most accurate information, what state are you currently living in?";
  addMessage('bot', greeting);
  history.push({ role: 'assistant', content: greeting });
}

msgInput.disabled = false;
startChat();
</script>
