<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>SNAP Eligibility Assistant</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@500&family=Inter:ital,wght@0,400;0,500;0,600&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    .material-icons { font-size: 24px; line-height: 1; display: block; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #e2e8f0;
      height: 100vh;
      height: 100dvh;
      overflow: hidden;
      display: flex;
      justify-content: center;
    }

    .app {
      width: 100%;
      max-width: 480px;
      height: 100vh;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      background: #f8fafc;
      box-shadow: 0 0 48px rgba(0,0,0,0.15);
      overflow: hidden;
    }

    /* ─── Header ──────────────────────────────────────── */
    .header {
      background: #ffffff;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
      border-bottom: 1px solid #f1f5f9;
    }
    .header-icon {
      width: 40px;
      height: 40px;
      border-radius: 8px;
      flex-shrink: 0;
      display: block;
      object-fit: cover;
    }
    .header-text { flex: 1; }
    .header-title {
      font-family: 'Roboto Mono', 'Courier New', monospace;
      font-weight: 500;
      font-size: 16px;
      color: #000;
      line-height: 1.2;
      letter-spacing: -0.005em;
    }
    .header-sub {
      font-size: 14px;
      font-weight: 400;
      color: rgba(0,0,0,0.7);
      margin-top: 2px;
      line-height: 1.4;
    }

    /* ─── Chat Area ────────────────────────────────────── */
    .chat-area {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 24px;
      scroll-behavior: smooth;
      -webkit-overflow-scrolling: touch;
    }

    /* ─── Message Rows ─────────────────────────────────── */
    .message { display: flex; flex-direction: column; width: 100%; }

    /* Bot message */
    .message.bot { align-items: flex-start; }
    .msg-row {
      display: flex;
      gap: 8px;
      align-items: flex-start;
      width: 100%;
    }

    /* Avatar */
    .avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: #d6f0f1;
      color: #1c7a74;
      font-size: 12px;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      letter-spacing: -0.5px;
    }

    /* Bot bubble */
    .message.bot .bubble {
      background: #ffffff;
      border: 1px solid #e2e8f0;
      border-radius: 16px;
      padding: 16px;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 6px;
      height: auto;
      min-height: unset;
      overflow: visible;
    }
    .message.bot .bubble.streaming-bubble .msg-time { display: none; }
    .bubble-text {
      font-size: 14px;
      font-weight: 500;
      line-height: 1.4;
      color: #1e293b;
      word-break: break-word;
    }
    .meal-plan-hint {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      margin-top: 10px;
      font-size: 12px;
      color: #64748b;
      line-height: 1.4;
      font-weight: 400;
    }
    .meal-plan-hint svg { flex-shrink: 0; margin-top: 1px; }
    .msg-time {
      display: flex;
      align-items: center;
      gap: 4px;
      align-self: flex-end;
      margin-left: auto;
    }
    .msg-time span {
      font-size: 12px;
      font-weight: 500;
      color: #69737c;
      letter-spacing: -0.06px;
      white-space: nowrap;
    }
    .check-icon { display: block; flex-shrink: 0; }

    /* User message */
    .message.user { align-items: flex-end; }
    .message.user .bubble {
      background: #1e827d;
      border-radius: 16px;
      padding: 12px 16px;
      max-width: 78%;
      display: flex;
      flex-direction: row;
      flex-wrap: wrap;
      align-items: flex-end;
      column-gap: 8px;
      row-gap: 2px;
    }
    .message.user .bubble-text { flex: 1 1 auto; }
    .message.user .bubble-text { color: #ffffff; }
    .message.user .msg-time span { color: #aee8e6; }

    /* ─── Quick Replies ────────────────────────────────── */
    .quick-replies {
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding-left: 40px; /* avatar (32) + gap (8) */
      width: 100%;
      margin-top: 8px;
    }
    .qr-btn {
      width: 100%;
      background: #ffffff;
      border: 1px solid #e2e8f0;
      border-radius: 16px;
      min-height: 44px;
      padding: 16px;
      font-family: inherit;
      font-size: 14px;
      font-weight: 600;
      color: #1e827d;
      cursor: pointer;
      text-align: left;
      display: flex;
      align-items: center;
      justify-content: flex-start;
      text-decoration: none;
      transition: background 0.15s;
    }
    .qr-btn:hover:not(:disabled) { background: #f0fdfa; text-decoration: none; }
    .qr-btn:hover, .qr-btn:visited, .qr-btn:active { color: #1e827d; text-decoration: none; }
    .qr-btn:disabled { opacity: 0.45; cursor: not-allowed; }

    /* ─── Typing Indicator ─────────────────────────────── */
    .typing-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .typing-bubble {
      display: flex;
      align-items: center;
      gap: 6px;
      background: #ffffff;
      border: 1px solid #e2e8f0;
      border-radius: 16px;
      padding: 16px;
    }
    .typing-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #94a3b8;
      animation: tdot 1.3s ease-in-out infinite;
    }
    .typing-dot:nth-child(2) { animation-delay: 0.18s; }
    .typing-dot:nth-child(3) { animation-delay: 0.36s; }
    .typing-label {
      font-size: 11px;
      color: #94a3b8;
      margin-left: 6px;
      align-self: center;
      font-style: italic;
    }
    @keyframes tdot {
      0%, 60%, 100% { transform: translateY(0);    opacity: 0.35; }
      30%            { transform: translateY(-5px); opacity: 1;    }
    }

    /* ─── Input Area ───────────────────────────────────── */
    .input-area {
      background: #f8fafc;
      padding: 8px 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      flex-shrink: 0;
    }
    .input-card {
      background: #ffffff;
      border: 1px solid #e2e8f0;
      border-radius: 24px;
      padding: 16px;
      box-shadow: 0 12px 16px -4px rgba(16,24,40,0.08), 0 4px 6px -2px rgba(16,24,40,0.04);
      display: flex;
      flex-direction: column;
      gap: 16px;
      transition: border-color 0.2s;
    }
    .input-card:focus-within {
      border-color: #1E827D;
    }
    .msg-input {
      width: 100%;
      border: none;
      outline: none;
      font-family: inherit;
      font-size: 16px;
      font-weight: 400;
      color: #1e293b;
      background: transparent;
      resize: none;
      min-height: 24px;
      max-height: 120px;
      line-height: 1.4;
      overflow-y: auto;
    }
    .msg-input::placeholder { color: #475569; }
    .msg-input:disabled { opacity: 0.5; }

    .input-actions {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }
    .action-left { display: flex; gap: 8px; align-items: center; flex: 1; min-width: 0; }

    .icon-btn {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: 1px solid #cbd5e1;
      background: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: #64748b;
      flex-shrink: 0;
      transition: background 0.15s;
    }
    .icon-btn:hover { background: #f8fafc; }

    .send-btn {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: #065c58;
      border: none;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
      transition: background 0.2s, opacity 0.2s;
    }
    .send-btn:hover:not(:disabled) { background: #1e827d; }
    .send-btn:disabled { opacity: 0.35; cursor: not-allowed; }

    /* Stop button shown during streaming */
    .send-btn.stop-mode { background: #121212; }
    .send-btn.stop-mode:hover { background: #2a2a2a; }

    /* ── Voice input pill ─────────────────────────────── */
    #attachBtn {
      transition: opacity 150ms cubic-bezier(0.4,0,0.2,1),
                  width 300ms cubic-bezier(0.4,0,0.2,1),
                  margin 300ms cubic-bezier(0.4,0,0.2,1),
                  padding 300ms cubic-bezier(0.4,0,0.2,1);
      flex-shrink: 0;
    }
    #attachBtn.voice-hidden {
      opacity: 0;
      width: 0;
      margin: 0;
      padding: 0;
      pointer-events: none;
      overflow: hidden;
      border: none;
    }
    #micBtn {
      transition: width 300ms cubic-bezier(0.4,0,0.2,1),
                  border-radius 300ms cubic-bezier(0.4,0,0.2,1),
                  padding 300ms cubic-bezier(0.4,0,0.2,1),
                  flex 300ms cubic-bezier(0.4,0,0.2,1);
      overflow: hidden;
      flex-shrink: 0;
      width: 40px;
    }
    #micBtn .mic-icon {
      transition: opacity 150ms cubic-bezier(0.4,0,0.2,1);
      opacity: 1;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #micBtn .voice-content {
      display: flex;
      align-items: center;
      justify-content: space-between;
      overflow: hidden;
      opacity: 0;
      transition: opacity 150ms cubic-bezier(0.4,0,0.2,1);
      pointer-events: none;
      position: absolute;
      left: 12px;
      right: 12px;
    }
    #micBtn {
      position: relative;
      height: 40px;
      box-sizing: border-box;
    }
    /* Active (recording) state */
    #micBtn.recording {
      width: auto;
      border-radius: 120px;
      flex: 1 1 0%;
      min-width: 0;
      padding: 8px 12px;
      height: 40px;
      cursor: default;
      overflow: hidden;
    }
    #micBtn.recording .mic-icon {
      opacity: 0;
      pointer-events: none;
    }
    #micBtn.recording .voice-content {
      opacity: 1;
      pointer-events: auto;
      transition-delay: 150ms;
    }
    /* Voice wave bars */
    .voice-wave {
      display: flex;
      align-items: center;
      gap: 4px;
      height: 18px;
    }
    .vbar {
      width: 2px;
      border-radius: 80px;
      flex-shrink: 0;
    }
    .vbar.active-bar {
      transform-origin: center;
      transition: transform 80ms ease-out, background-color 150ms ease;
    }
    .voice-left {
      display: flex;
      align-items: center;
      gap: 8px;
      flex: 1;
      min-width: 0;
    }
    .voice-stop-label {
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      font-weight: 500;
      color: #000;
      white-space: nowrap;
      cursor: pointer;
    }
    .voice-timer {
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      font-weight: 400;
      color: #000;
      white-space: nowrap;
      flex-shrink: 0;
      font-variant-numeric: tabular-nums;
    }

    /* ── Eligibility amount display ───────────────────── */
    .advisor-link { color: #1e827d; text-decoration: none; }
    .advisor-link:hover { text-decoration: underline; }
    .apply-checklist {
      margin: 0.5em 0 0 1.2em;
      font-size: 14px;
      color: #1e293b;
      line-height: 1.6;
    }
    .apply-cta-btn {
      display: block;
      margin-top: 12px;
      background: #1e827d;
      color: white;
      text-decoration: none;
      text-align: center;
      padding: 10px 16px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      width: 100%;
      box-sizing: border-box;
      transition: background 0.15s;
    }
    .apply-cta-btn:hover { background: #196b67; }
    .benefit-amount {
      display: flex;
      align-items: baseline;
      gap: 2px;
      margin: 4px 0;
    }
    .benefit-amount-figure {
      font-size: 20px;
      font-weight: 700;
      color: #1e827d;
      line-height: 1.4;
    }
    .benefit-amount-unit {
      font-size: 14px;
      font-weight: 500;
      color: #1c7a74;
      line-height: 1.4;
    }
    .benefit-list {
      margin: 4px 0 0 21px;
      padding: 0;
      font-size: 14px;
      color: #1e293b;
      line-height: 1.4;
    }
    .benefit-list li {
      margin-bottom: 2px;
    }

    /* File preview */
    .file-preview:empty { display: none; }
    .file-preview {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .file-preview-item {
      position: relative;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: #f1f5f9;
      border-radius: 12px;
      padding: 4px 8px;
      font-size: 12px;
      color: #1e293b;
    }
    .file-preview-item img {
      width: 40px;
      height: 40px;
      object-fit: cover;
      border-radius: 8px;
    }
    .file-preview-remove {
      position: absolute;
      top: -6px;
      right: -6px;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: #1e293b;
      color: white;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
    }

    /* Streaming cursor on the active bubble */
    .bubble-text.streaming::after {
      content: '';
      display: inline-block;
      width: 2px;
      height: 1em;
      background: #1e827d;
      margin-left: 2px;
      vertical-align: text-bottom;
      animation: blink 0.7s step-end infinite;
    }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

    /* Message fade-in */
    @keyframes msgIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .message { animation: msgIn 0.2s ease-out both; }

    /* Error bubble */
    .bubble-error {
      background: #fef2f2;
      border-color: #fecaca;
      color: #991b1b;
    }
    .retry-btn {
      margin-top: 8px;
      background: none;
      border: 1px solid #fca5a5;
      border-radius: 8px;
      color: #991b1b;
      font-family: inherit;
      font-size: 12px;
      font-weight: 600;
      padding: 4px 10px;
      cursor: pointer;
    }
    .retry-btn:hover { background: #fee2e2; }

    .privacy-note {
      text-align: center;
      font-size: 12px;
      font-weight: 400;
      color: #757575;
    }

    /* ─── Sources Chip (lives inside the bubble's time row) ── */
    .sources-stack {
      display: flex;
      gap: 4px;
      align-items: center;
      width: 100%;
    }
    .sources-stack .msg-time {
      flex: 1 0 0;
      justify-content: flex-end;
      align-self: auto;
    }
    .sources-chip {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      background: #eef3ef;
      color: #000000;
      border: none;
      border-radius: 32px;
      padding: 4px 8px;
      font-family: inherit;
      font-size: 14px;
      font-weight: 400;
      cursor: pointer;
      flex-shrink: 0;
      transition: background 0.15s;
    }
    .sources-chip:hover { background: #ddeadf; }

    /* ─── Sheet Overlay ────────────────────────────────── */
    .sheet-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 100;
      opacity: 0;
      transition: opacity 0.25s ease;
    }
    .sheet-overlay.open { opacity: 1; }

    /* ─── Bottom Sheet ─────────────────────────────────── */
    .sheet {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%) translateY(100%);
      width: 100%;
      max-width: 480px;
      max-height: 70vh;
      background: #ffffff;
      border-radius: 16px 16px 0 0;
      z-index: 101;
      display: flex;
      flex-direction: column;
      box-shadow: 0 -4px 32px rgba(0,0,0,0.12);
      transition: transform 0.3s cubic-bezier(0.32, 0.72, 0, 1);
    }
    .sheet.open { transform: translateX(-50%) translateY(0); }

    .sheet-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 16px 16px;
      flex-shrink: 0;
    }
    .sheet-title {
      font-size: 18px;
      font-weight: 500;
      color: #1e293b;
      line-height: 1.4;
    }
    .sheet-close {
      width: 24px;
      height: 24px;
      border: none;
      background: none;
      color: #1e293b;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      flex-shrink: 0;
    }
    .sheet-close:hover { opacity: 0.7; }
    .sheet-body {
      overflow-y: auto;
      padding: 0 16px 32px;
      display: flex;
      flex-direction: column;
      flex: 1;
    }

    /* ─── Source Cards ─────────────────────────────────── */
    .source-card {
      display: flex;
      flex-direction: column;
      gap: 7px;
      padding: 12px 0;
      cursor: pointer;
      text-decoration: none;
      color: inherit;
      border-top: 1px solid #e2e8f0;
      transition: opacity 0.15s;
    }
    .source-card:first-child { border-top: none; padding-top: 0; }
    .source-card:hover { opacity: 0.75; }
    .source-card-top {
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .source-favicon {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      flex-shrink: 0;
      object-fit: contain;
    }
    .source-domain {
      font-size: 12px;
      font-weight: 400;
      color: #69737c;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .source-title {
      font-size: 16px;
      font-weight: 500;
      color: #1e293b;
      line-height: 1.4;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .source-context {
      font-size: 12px;
      font-weight: 400;
      color: #69737c;
      line-height: 1.2;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    /* ─── Action Cards (Phase 3) ──────────────────────── */
    .action-cards {
      display: flex;
      flex-direction: column;
      gap: 8px;
      width: 100%;
      padding-left: 40px;
      margin-top: 8px;
    }
    .action-card {
      display: flex;
      align-items: center;
      gap: 12px;
      background: #ffffff;
      border: 1px solid #e2e8f0;
      border-radius: 16px;
      padding: 14px 16px;
      cursor: pointer;
      text-decoration: none;
      color: inherit;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
      transition: background 0.15s, box-shadow 0.15s;
      width: 100%;
      text-align: left;
      font-family: inherit;
    }
    .action-card:hover { background: #f0fdfa; box-shadow: 0 2px 8px rgba(0,0,0,0.10); }
    .action-card:disabled { pointer-events: none; opacity: 0.5; }
    .action-card-icon {
      width: 40px;
      height: 40px;
      border-radius: 12px;
      background: #d6f0f1;
      color: #1c7a74;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .action-card-text { flex: 1; min-width: 0; }
    .action-card-title {
      font-size: 14px;
      font-weight: 600;
      color: #1e293b;
      line-height: 1.3;
    }
    .action-card-sub {
      font-size: 12px;
      font-weight: 400;
      color: #69737c;
      margin-top: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .action-card-chevron { color: #94a3b8; flex-shrink: 0; font-size: 20px !important; }

    /* ─── Booking: Service Select Cards ───────────────── */
    .service-cards {
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding-left: 40px;
      margin-top: 8px;
      width: 100%;
    }
    .service-card {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      background: #ffffff;
      border: 1.5px solid #e2e8f0;
      border-radius: 16px;
      padding: 14px 16px;
      cursor: pointer;
      text-align: left;
      font-family: inherit;
      transition: border-color 0.15s, background 0.15s;
      width: 100%;
    }
    .service-card:hover { border-color: #1e827d; background: #f0fdfa; }
    .service-card.selected { border-color: #1e827d; background: #f0fdfa; }
    .service-card.disabled { pointer-events: none; opacity: 0.5; }
    .service-card-check {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      border: 1.5px solid #cbd5e1;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      margin-top: 1px;
      transition: background 0.15s, border-color 0.15s;
    }

'use strict';

// ── System Prompt ──────────────────────────────────────────────────────────────
const SYSTEM_PROMPT = `You are a warm, knowledgeable SNAP Benefits Assistant helping people in Texas figure out if they qualify for food assistance. You are like a knowledgeable friend, professional but friendly, clear but not robotic.

TONE:
- Warm and friendly but professional
- Never use filler phrases like "Of course!", "Absolutely!", "Great question!"
- Use natural transitions: "Got it." / "Makes sense." / "That helps."
- Contractions encouraged: you're, don't, let's, that's
- NEVER use em dashes (the \u2014 character). Use commas or new sentences instead.
- Keep responses to 2-3 sentences max
- When response has a statement AND a question, separate with a line break

PLAIN LANGUAGE \u2014 always translate jargon:
- "gross income" \u2192 "all the money you make before taxes"
- "household" \u2192 "everyone you buy and cook food with"
- "half-time" \u2192 "at least half the classes of a full-time student"
- "work-study" \u2192 "a school job program"
- "TANF" \u2192 "TANF (a cash assistance program for families)"
- "SSN" \u2192 "Social Security Number"
- "enrollment verification" \u2192 "a letter from your school confirming you're enrolled"

FORMAT RULES:
- For multiple-choice questions, end your message with OPTIONS:["Option A","Option B"] on its own line.
- Tag phase transitions by starting the message with PHASE:2 or PHASE:3.
- Always end with either a question or OPTIONS:[...] to keep the conversation moving.

SNAP POLICY REFERENCE \u2014 FY2026 (Oct 1, 2025 \u2013 Sept 30, 2026)

INCOME LIMITS (Source: USDA FNS):
Gross monthly income limit (130% FPL):
1=$1,696 | 2=$2,292 | 3=$2,888 | 4=$3,483 | 5=$4,079
Net monthly income limit (100% FPL):
1=$1,305 | 2=$1,763 | 3=$2,221 | 4=$2,680 | 5=$3,138
Asset limit: $3,000 for most | $4,500 if someone is 60+ or has a disability

MAXIMUM MONTHLY BENEFITS (Source: USDA FNS):
1=$298 | 2=$546 | 3=$785 | 4=$994 | 5=$1,183

WORK RULES (Source: USDA FNS):
Adults 18-54 without dependents must work or participate in job training for at least 80 hours/month to receive SNAP beyond 3 months.
Exemptions from work rules:
- Have a dependent child under 18
- Pregnant
- Physically or mentally unfit for work
- Already working 80+ hours/month
- Participating in a work training program
- Age 55 or older
- Age 18-24 and enrolled in school at least half-time

TEXAS-SPECIFIC (Source: Texas HHSC):
- Apply at YourTexasBenefits.com or call 2-1-1
- Applications processed within 30 days
- Expedited SNAP within 7 days if monthly income under $150 and liquid resources under $100

STUDENT RULES (Source: USDA FNS):
- Students enrolled half-time or more in higher education are generally ineligible
- Exemptions: working 20+ hrs/week, work-study offered, dependent child, disability, TANF
- Continuing education, ESL, and workforce training are NOT subject to student rules

UT AUSTIN RESOURCES:
- UT Outpost: https://deanofstudents.utexas.edu/emergency/utoutpost.php
- Student Emergency Services: https://deanofstudents.utexas.edu/emergency
- Central Texas Food Bank: https://www.centraltexasfoodbank.org

CITATION RULES:
- When sharing policy numbers or rules, cite the source inline: "According to [source name](URL), ..."
- For income/benefit data, cite: [USDA FNS](https://www.fns.usda.gov/snap/recipient/eligibility)
- For benefit amounts, cite: [USDA FNS](https://www.fns.usda.gov/snap/allotment/cola)
- For work rules, cite: [USDA FNS](https://www.fns.usda.gov/snap/work-requirements)
- For Texas-specific rules, cite: [Texas HHSC](https://www.hhs.texas.gov/snap)
- For student rules, cite: [USDA FNS Student Rules](https://www.fns.usda.gov/snap/students)
- Never make up policy details

CONVERSATION FLOW:

The greeting is already shown. The user has told you what state they're in. Respond to their state, then proceed.

PHASE 1 \u2014 STUDENT CHECK:

After user answers state:
- Texas \u2192 "Texas participates in SNAP." \u2192 continue to Step 1
- Other US state \u2192 note this tool is optimized for Texas, offer general SNAP guidance \u2192 continue to Step 1
- Outside US \u2192 explain SNAP is US-only, end warmly. STOP.

Step 1 \u2014 Enrollment status:
OPTIONS:["Yes, at least half-time","No / less than half-time"]
- Less than half-time \u2192 "Student rules don't apply to you." \u2192 Set path = NON_STUDENT \u2192 go to PHASE 2
- Half-time or more \u2192 go to Step 2

Step 2 \u2014 Program type:
OPTIONS:["Degree program (BA, BS, MS, PhD, etc.)","Vocational or trade school","Continuing ed, ESL, or workforce training"]
- Continuing ed / ESL / workforce \u2192 "You're not subject to student rules." \u2192 Set path = NON_STUDENT \u2192 go to PHASE 2
- Degree or vocational \u2192 go to Step 3

Step 3 \u2014 Meal plan:
OPTIONS:["Yes, I have a school meal plan","No meal plan"]
- No meal plan \u2192 Set path = STUDENT_EXEMPT \u2192 go to PHASE 2
- Yes meal plan \u2192 go to Step 3b

Step 3b \u2014 Meal plan level check:
Ask: "Got it. Just to clarify \u2014 how many meals a week does your plan actually cover? A full week has 21 meals (3 meals \u00d7 7 days). If your plan covers more than half of those, it affects your SNAP eligibility."
OPTIONS:["More than 10 meals a week (most meals covered)","10 meals or fewer a week (only some meals)","I\u2019m not sure how to count mine"]
- More than 10 meals \u2192 Use INELIGIBLE_SPLIT format. Bubble 1: Explain the student meal plan rule \u2014 covering more than 50% of weekly meals (>10 of 21) makes a student ineligible for SNAP. Be empathetic. Bubble 2 is hardcoded by frontend. STOP.
- 10 or fewer meals \u2192 "Good news \u2014 your meal plan only covers part of the week, so it doesn\u2019t block your eligibility. Let\u2019s keep going." \u2192 go to Step 4
- Not sure \u2192 Explain: "Count each scheduled meal your plan provides per week \u2014 breakfast, lunch, and dinner each count as 1. If your plan covers 5 weekday lunches, that\u2019s 5 meals. If it covers breakfast and lunch on weekdays, that\u2019s 10 meals." Then re-ask with OPTIONS:["More than 10 meals a week (most meals covered)","10 meals or fewer a week (only some meals)"]

Step 4 \u2014 Exemption check:
OPTIONS:["I work 20+ hours per week","My school offers work-study","I have a dependent child","I have a documented disability","I receive TANF","None of these apply"]
- None \u2192 Explain meal plan blocks eligibility. Suggest UT Outpost, Central Texas Food Bank, Student Emergency Services. End warmly. STOP.
- Any other \u2192 "That exemption qualifies you to move forward." \u2192 Set path = STUDENT_EXEMPT \u2192 go to PHASE 2

MEAL PLAN CLARIFICATION — Official USDA Policy
(Source: USDA FNS — https://www.fns.usda.gov/snap/clarification-meal-plans-institutions-higher-education)
Issued: June 2, 2022

1. DEFINITION OF INELIGIBLE MEAL PLAN:
A student is considered a "resident of an institution" and ineligible for SNAP if their meal plan covers MORE than 50% of three daily meals — meaning more than 10 out of 21 weekly meals.

2. BOTH MANDATORY AND OPTIONAL MEAL PLANS COUNT:
Whether the school requires the meal plan or the student chose it voluntarily, both types are treated the same under SNAP rules.

3. HOW TO COUNT MEALS:
Meal plans may be structured by number of meals, points, or dollars — all should be converted to equivalent meal count.
Example from official memo:
- Breakfast + lunch on weekdays = 10 meals/week = does NOT block eligibility
- Plans covering 3 meals/day (Unlimited, Level 3, 4, or higher) = blocks eligibility

4. PARTIAL MEAL PLANS MAY STILL QUALIFY:
Students with lower-tier meal plans (10 meals or fewer per week) are NOT considered institution residents and may be eligible for SNAP if they meet all other criteria.

5. SCREENING REQUIREMENT:
States must evaluate each student's meal plan individually — they cannot deny eligibility simply because a student has any meal plan.

When a user asks about meal plans, cite this source and explain the 50% threshold rule in plain language.

INCOME TYPES REFERENCE (Source: Texas Works Handbook A-1320 — https://www.hhs.texas.gov/handbooks/texas-works-handbook/a-1320-types-income)
Use this to answer any questions about what counts as income for SNAP.

EARNED INCOME (counts toward the limit):
- Wages and salaries from a job (before taxes)
- Self-employment income (profit after business expenses)
- Farm income, tips, commissions
- Military base pay, seasonal employment income

UNEARNED INCOME (also counts):
- Social Security or disability benefits (RSDI, SSI)
- Unemployment benefits
- Child support received
- Veterans Affairs (VA) benefits
- TANF cash assistance, military allotments
- Pension or retirement payments

NOT COUNTED (exempt from income):
- Federal tax refunds and Earned Income Tax Credit (EIC) payments
- Flexible fringe benefits (health insurance, childcare benefits)
- Financial aid used for education expenses
- Loans that must be repaid
- One-time lump sum payments (in most cases)

GROSS INCOME = all earned + unearned income before any deductions
NET INCOME = gross income minus allowable deductions (rent, utilities, childcare, medical expenses for elderly/disabled)

When a user asks "what counts as income?" or "does X count as income?", answer accurately using this reference and cite: [Texas Works Handbook A-1320](https://www.hhs.texas.gov/handbooks/texas-works-handbook/a-1320-types-income)

PHASE 2 — INCOME SNAPSHOT:
Tag this message with PHASE:2

Step 5 \u2014 Household size:
OPTIONS:["Just me (1 person)","2 people","3 people","4 people","5 or more people"]

Step 6 — Income check:
Share the income limit using this EXACT sentence format:
"For a [X]-person household, the gross monthly income limit is HIGHLIGHT:$[number]. This includes the total income everyone in your household makes before taxes, from all sources like wages, benefits, or financial support.

How does your household's monthly income compare to that?"

FY2026 limits: 1=$1,696 | 2=$2,292 | 3=$2,888 | 4=$3,483 | 5+=$4,079
IMPORTANT: Use HIGHLIGHT:$[number] exactly as shown — the frontend renders it in teal color. Never use **markdown bold** for the amount.
OPTIONS:["Below that limit","Around that limit","Clearly above that limit"]

- Clearly above \u2192 Use INELIGIBLE_SPLIT format (see below). Bubble 1: Explain they are over the income limit for their household size. Be empathetic. Include a markdown citation link so the Sources chip appears. Bubble 2 is hardcoded by frontend. STOP.

- Below or around AND path = STUDENT_EXEMPT:
  \u2192 "You're very likely eligible for SNAP!" Give estimated max benefit.
  \u2192 Skip Work Rules check \u2192 go to PHASE 3

- Below or around AND path = NON_STUDENT:
  \u2192 Go to Step 7 (Work Rules check)

Step 7 \u2014 Work Rules check (NON_STUDENT path only):
"One more thing, SNAP has a work requirement for some adults. Do any of these apply to you?"
OPTIONS:["I work or volunteer 80+ hours/month","I have a child under 18","I'm in a job training program","I'm 55 or older","I'm a student enrolled at least half-time","None of these apply"]
- None \u2192 Output INELIGIBLE result (see format below). STOP.
- Any other \u2192 go to PHASE 3 (eligible result)

PHASE 3 \u2014 NEXT STEPS:
Tag this message with PHASE:3

━━━ ELIGIBLE RESULT FORMAT ━━━
When user IS eligible, output this EXACT structure — no additions, no rephrasing:

Based on what you've shared, you're likely eligible for SNAP.

AMOUNT:$[number from table below]

Your actual benefit depends on your income and expenses. To apply, you'll need:
LIST:
1. Proof of income (pay stub or financial aid letter)
2. Your Social Security Number
3. Bank statements (if applicable)
END_LIST
OPTIONS:["Start applying on TexasBenefits.com","I have more questions to ask UT Outpost advisor","I'll apply later"]

Monthly benefit amounts: 1=$298 | 2=$546 | 3=$785 | 4=$994 | 5=$1,183

RULES — do not break these:
- Paragraph 1: use the exact text "Based on what you've shared, you're likely eligible for SNAP." — no additions
- Paragraph 2: exactly 1 sentence before the list — copy it word for word
- Do NOT repeat the dollar amount or household size in paragraph 2
- Do NOT add "What would you like to do next?" anywhere
- Copy the OPTIONS text above exactly — do not rephrase the button labels

━━━ INELIGIBLE RESULT FORMAT ━━━
When user is NOT eligible, output TWO messages separated by the token INELIGIBLE_SPLIT on its own line:

MESSAGE 1 — Reason (2-3 sentences max, warm and clear):
Explain why they don't qualify right now using plain language.
Reference the specific rule that applies.
End message 1 with a markdown citation link so the Sources chip appears.
Example for work rules:
"Based on what you've shared, you may not qualify for ongoing SNAP benefits right now.

Adults 18–54 without dependents generally need to work or participate in job training for at least 80 hours/month to continue receiving benefits beyond 3 months. [USDA FNS](https://www.fns.usda.gov/snap/work-requirements)"

INELIGIBLE_SPLIT

(The frontend renders the resource list automatically after INELIGIBLE_SPLIT — do NOT output anything after the token.)

Do NOT output OPTIONS after INELIGIBLE_SPLIT. Stop after the token.

━━━ ADVISOR RESPONSE ━━━
When user selects "I have more questions to ask UT Outpost advisor" \u2192 Output this EXACT format, no deviations:

ADVISOR:1
Got it. UT Outpost advisors can walk you through the full application in person.

UT Outpost Details:
- Location: Student Services Building (SSB), Ground Floor
- Website: https://deanofstudents.utexas.edu/emergency/utoutpost.php

To schedule an appointment, you can:
OPTIONS:["Book SNAP advising session","Call to book an appointment: 512-471-6242"]

- "I'll apply later" \u2192 The frontend handles this directly with a summary card. Do NOT generate a response for this option.

Always end with warmth. Remind them SNAP exists to help, there is no shame in applying.`;

// ── Response Parsing ───────────────────────────────────────────────────────────
function parseResponse(raw) {
  let text = raw.trim();
  let phase = null;
  let options = [];

  // PHASE tag at start
  const phaseM = text.match(/^PHASE:(\d)\s*\n?/);
  if (phaseM) {
    phase = parseInt(phaseM[1]);
    text  = text.slice(phaseM[0].length).trim();
  }

  // Strip any stray phase labels the model may include in the visible text
  text = text.replace(/^PHASE:\d\s*\n?/gim, '').trim();
  text = text.replace(/\bPhase\s+\d\b\s*[—\-–]?\s*/gi, '').trim();

  // Strip "What would you like to do next?" — conveyed by the buttons, not text
  text = text.replace(/\n?What would you like to do next\??/gi, '').trim();

  // OPTIONS tag — strip citation links from a scratch copy first so a trailing
  // [Text](url) citation on the same or next line doesn't break the match.
  const textNoCitations = text.replace(/\s*\[[^\]]+\]\(https?:\/\/[^\)\s]+\)/g, '');
  const optM = textNoCitations.match(/OPTIONS:\[(.+?)\]\s*$/m);
  if (optM) {
    try {
      options = JSON.parse('[' + optM[1] + ']');
    } catch {
      options = optM[1]
        .split(/",\s*"/)
        .map(s => s.replace(/^"|"$/g, '').trim())
        .filter(Boolean);
    }
    // Remove the OPTIONS token and anything trailing on that line (e.g. a citation)
    text = text.replace(/\n?OPTIONS:\[.+?\][^\n]*$/m, '').trim();
  }

  // AMOUNT tag
  let amount = null;
  const amountM = text.match(/AMOUNT:\$(\d+)/);
  if (amountM) {
    amount = amountM[1];
    text = text.replace(/\n?AMOUNT:\$\d+\n?/, '\n\n');
  }

  // LIST:.../END_LIST tag
  let listItems = null;
  const listM = text.match(/LIST:\n([\s\S]*?)\nEND_LIST/);
  if (listM) {
    listItems = listM[1]
      .split('\n')
      .map(l => l.replace(/^\d+\.\s*/, '').trim())
      .filter(Boolean);
    text = text.replace(/\n?LIST:\n[\s\S]*?\nEND_LIST\n?/, '');
  }

  // ADVISOR tag
  let advisor = false;
  const advisorM = text.match(/^ADVISOR:1\s*\n?/);
  if (advisorM) { advisor = true; text = text.slice(advisorM[0].length).trim(); }

  return { phase, options, text, amount, listItems, advisor };
}

// Split text into (statement paragraph, question paragraph) for single-bubble rendering.
// Returns { part1, part2 } if both parts exist, otherwise null.
function splitAtQuestion(text) {
  const marked = text.replace(/([.!?])\s+/g, '$1\x00');
  const sentences = marked.split('\x00').map(s => s.trim()).filter(Boolean);
  if (sentences.length < 2) return null;

  let lastQIdx = -1;
  for (let i = sentences.length - 1; i >= 0; i--) {
    if (sentences[i].endsWith('?')) { lastQIdx = i; break; }
  }
  if (lastQIdx <= 0) return null;

  const part1 = sentences.slice(0, lastQIdx).join(' ').trim();
  const part2 = sentences.slice(lastQIdx).join(' ').trim();
  if (!part1 || !part2) return null;
  return { part1, part2 };
}

// Attach quick-reply buttons or action cards to a message wrap element.
function attachOptions(wrap, options, phase, advisor = false) {
  if (options.length === 0) return;
  const qrWrap = document.createElement('div');
  qrWrap.className = 'quick-replies';
  qrWrap.setAttribute('role', 'group');
  qrWrap.setAttribute('aria-label', 'Reply options');

  if (advisor) {
    // Advisor-specific buttons — rendered as links, not chat messages
    const advisorActions = [
      { text: 'Book SNAP advising session', href: 'https://outlook.office.com/book/SNAPBenefitsAdvising@utexas.onmicrosoft.com/', tel: false },
      { text: 'Call to book an appointment: 512-471-6242', href: 'tel:512-471-6242', tel: true },
    ];
    advisorActions.forEach(action => {
      const a = document.createElement('a');
      a.className = 'qr-btn';
      a.textContent = action.text;
      a.href = action.href;
      if (!action.tel) { a.target = '_blank'; a.rel = 'noopener noreferrer'; }
      qrWrap.appendChild(a);
    });
  } else {
    // All options render as chat-sending buttons.
    // 'Start applying on TexasBenefits.com' is intercepted in handleUserMessage.
    options.forEach(opt => {
      const btn = document.createElement('button');
      btn.className = 'qr-btn';
      btn.textContent = opt;
      btn.addEventListener('click', () => {
        qrWrap.querySelectorAll('.qr-btn').forEach(b => b.disabled = true);
        handleUserMessage(opt);
      });
      qrWrap.appendChild(btn);
    });
  }
  wrap.appendChild(qrWrap);
}

// Attach inline source citations chip to a bubble if the raw text has links.
function attachCitations(raw, wrap, msgRow) {
  if (!hasCitations(raw)) return;
  const citSources = parseCitations(raw);
  if (citSources.length === 0) return;
  const bubble = msgRow.querySelector('.bubble');
  const timeEl  = bubble.querySelector('.msg-time');
  const stack = document.createElement('div');
  stack.className = 'sources-stack';
  stack.appendChild(buildSourcesChip(citSources));
  stack.appendChild(timeEl);
  bubble.appendChild(stack);
}

// ── Citation Parsing ───────────────────────────────────────────────────────────
function stripMarkdownLinks(text) {
  return text
    .replace(/\s*\[([^\]]+)\]\(https?:\/\/[^\)\s]+\)/g, '')  // [text](url)
    .replace(/\*\*([^*]+)\*\*/g, '$1')                        // **bold**
    .replace(/\*([^*]+)\*/g, '$1')                            // *italic*
    .replace(/HIGHLIGHT:(\$[\d,]+)/g, '$1')                   // HIGHLIGHT tag → plain amount
    .replace(/\u2014/g, ',')                                  // em dash → comma
    .replace(/\s+\-\s+/g, ', ');                              // " - " dash → comma
}

// Render a text string with HIGHLIGHT:$XXX as an inline teal bold span
function renderHighlightText(container, rawText) {
  const hasHighlight = /HIGHLIGHT:\$[\d,]+/.test(rawText);
  if (!hasHighlight) {
    container.textContent = stripMarkdownLinks(rawText);
    return;
  }
  // Pre-clean everything except HIGHLIGHT tags, then split
  const cleaned = rawText
    .replace(/\s*\[([^\]]+)\]\(https?:\/\/[^\)\s]+\)/g, '')
    .replace(/\*\*([^*]+)\*\*/g, '$1')
    .replace(/\*([^*]+)\*/g, '$1')
    .replace(/\u2014/g, ',')
    .replace(/\s+\-\s+/g, ', ');
  const parts = cleaned.split(/(HIGHLIGHT:\$[\d,]+)/);
  parts.forEach(part => {
    const m = part.match(/^HIGHLIGHT:(\$[\d,]+)$/);
    if (m) {
      const span = document.createElement('span');
      span.textContent = m[1];
      span.style.color = '#1e827d';
      span.style.fontWeight = '600';
      container.appendChild(span);
    } else if (part) {
      container.appendChild(document.createTextNode(part));
    }
  });
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function extractDomain(url) {
  try { return new URL(url).hostname.replace(/^www\./, ''); } catch { return url; }
}

function extractContext(raw, url) {
  const escaped = url.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  const m = raw.match(new RegExp('.{0,160}' + escaped + '.{0,160}'));
  if (!m) return '';
  return stripMarkdownLinks(m[0]).trim();
}

function parseCitations(raw) {
  const sources = [];
  const seen = new Set();
  const re = /\[([^\]]+)\]\((https?:\/\/[^\)\s]+)\)/g;
  let m;
  while ((m = re.exec(raw)) !== null) {
    const [, title, url] = m;
    if (seen.has(url)) continue;
    seen.add(url);
    sources.push({ url, title: title.trim(), domain: extractDomain(url), context: extractContext(raw, url) });
  }
  return sources;
}

function hasCitations(raw) {
  return /According to/i.test(raw) || /\[[^\]]+\]\(https?:\/\/[^\)\s]+\)/.test(raw);
}

function buildSourcesChip(sources) {
  const btn = document.createElement('button');
  btn.className = 'sources-chip';
  btn.innerHTML = `Sources<span class="material-icons" style="font-size:16px;line-height:1;display:inline-block;vertical-align:middle">keyboard_arrow_down</span>`;
  btn.addEventListener('click', () => openSheet(sources));
  return btn;
}

// ── Sources Sheet ──────────────────────────────────────────────────────────────
function openSheet(sources) {
  document.getElementById('sheetTitle').textContent = `${sources.length} source${sources.length !== 1 ? 's' : ''}`;
  sheetBody.innerHTML = '';
  sources.forEach(src => {
    const a = document.createElement('a');
    a.className = 'source-card';
    a.href = src.url;
    a.target = '_blank';
    a.rel = 'noopener noreferrer';
    a.innerHTML = `
      <div class="source-card-top">
        <img class="source-favicon" src="https://www.google.com/s2/favicons?domain=${encodeURIComponent(src.domain)}&sz=32" alt="" aria-hidden="true">
        <span class="source-domain">${esc(src.domain)}</span>
      </div>
      <div class="source-title">${esc(src.title)}</div>
      ${src.context ? `<div class="source-context">${esc(src.context)}</div>` : ''}`;
    sheetBody.appendChild(a);
  });
  sheetOverlay.style.display = 'block';
  sourceSheet.setAttribute('aria-hidden', 'false');
  requestAnimationFrame(() => {
    sheetOverlay.classList.add('open');
    sourceSheet.classList.add('open');
  });
}

function closeSheet() {
  sheetOverlay.classList.remove('open');
  sourceSheet.classList.remove('open');
  setTimeout(() => {
    sheetOverlay.style.display = 'none';
    sourceSheet.setAttribute('aria-hidden', 'true');
  }, 300);
}

// ── Render Helpers ─────────────────────────────────────────────────────────────
function nowTime() {
  const d = new Date();
  return `${d.getHours()}:${String(d.getMinutes()).padStart(2, '0')}`;
}

const checkSVG = (color) => `<span class="material-icons check-icon" style="font-size:16px;color:${color}">done_all</span>`;

function addMessage(role, text, options = []) {
  const t = nowTime();
  const wrap = document.createElement('div');
  wrap.className = `message ${role}`;

  if (role === 'bot') {
    const msgRow = document.createElement('div');
    msgRow.className = 'msg-row';
    msgRow.innerHTML = `
      <div class="avatar">SB</div>
      <div class="bubble">
        <p class="bubble-text"></p>
        <div class="msg-time">
          <span>${t}</span>
          ${checkSVG('#94a3b8')}
        </div>
      </div>`;
    const bubbleTextEl = msgRow.querySelector('.bubble-text');
    const paras = text.split('\n\n');
    if (paras.length > 1) {
      paras.forEach((p, i) => {
        const el = document.createElement('p');
        el.textContent = p;
        if (i > 0) el.style.marginTop = '0.5em';
        bubbleTextEl.appendChild(el);
      });
    } else {
      bubbleTextEl.textContent = text;
    }
    wrap.appendChild(msgRow);

    if (options.length > 0) {
      const qrWrap = document.createElement('div');
      qrWrap.className = 'quick-replies';
      options.forEach(opt => {
        const btn = document.createElement('button');
        btn.className   = 'qr-btn';
        btn.textContent = opt;
        btn.addEventListener('click', () => {
          qrWrap.querySelectorAll('.qr-btn').forEach(b => b.disabled = true);
          handleUserMessage(opt);
        });
        qrWrap.appendChild(btn);
      });
      wrap.appendChild(qrWrap);
    }
  } else {
    wrap.innerHTML = `
      <div class="bubble">
        <p class="bubble-text"></p>
        <div class="msg-time">
          <span>${t}</span>
          ${checkSVG('#aee8e6')}
        </div>
      </div>`;
    wrap.querySelector('.bubble-text').textContent = text;
  }

  chatArea.appendChild(wrap);
  scrollBottom();
}

// Internal tag names — sorted longest-first so we catch longer prefixes first
const STREAMING_TAG_NAMES = [
  'INELIGIBLE_SPLIT', 'HIGHLIGHT', 'END_LIST', 'OPTIONS',
  'ADVISOR', 'AMOUNT', 'PHASE', 'LIST',
];

/**
 * Strips all internal AI tags from text before displaying it in the bubble
 * during streaming. Handles:
 *   PHASE:N   OPTIONS:[...]   AMOUNT:$NNN   LIST:...END_LIST
 *   HIGHLIGHT:$NNN   INELIGIBLE_SPLIT   ADVISOR:1
 *
 * Also trims any trailing partial-tag prefix so a tag split across chunks
 * (e.g. "PHAS" … "E:2") never flashes in the bubble.
 */
function stripStreamingTags(text) {
  // Strip complete known tags
  text = text.replace(/PHASE:\d[^\S\n]*\n?/g, '');         // PHASE:N
  text = text.replace(/OPTIONS:\[[^\]]*\]/g, '');           // OPTIONS:[...]
  text = text.replace(/AMOUNT:\$[\d,]+/g, '');              // AMOUNT:$NNN
  text = text.replace(/LIST:[\s\S]*?END_LIST/g, '');        // LIST:...END_LIST
  text = text.replace(/HIGHLIGHT:\$[\d,]+/g, '');           // HIGHLIGHT:$NNN
  text = text.replace(/\nINELIGIBLE_SPLIT[\s\S]*/g, '');   // INELIGIBLE_SPLIT + all after
  text = text.replace(/ADVISOR:1[^\S\n]*\n?/g, '');        // ADVISOR:1

  // Trim trailing partial tag prefix (tag split across streaming chunks).
  // Walk from longest possible prefix down to 1 char; if the tail of `text`
  // matches the start of any tag name, chop it off so it doesn't flash.
  outer: for (const name of STREAMING_TAG_NAMES) {
    for (let len = Math.min(name.length, text.length); len >= 1; len--) {
      if (text.endsWith(name.slice(0, len))) {
        text = text.slice(0, text.length - len);
        break outer;
      }
    }
  }

  return text;
}

function updateBubbleText(bubbleText, raw) {
  bubbleText.textContent = stripMarkdownLinks(raw);
  maybeScroll();
}

// Returns true if `raw` is a structured/defined bubble that has its own
// custom rendering path (advisor, amount, ineligible). These skip auto-formatting.
const isDefinedBubble = (raw) =>
  raw.includes('AMOUNT:$') ||
  raw.includes('LIST:') ||
  raw.includes('UT Outpost Details') ||
  raw.includes('SNAP Eligibility Summary');

// Sentence starters that signal a new paragraph should begin
const PARA_STARTERS = [
  'To ', 'You ', 'Here ', 'Based ', 'Since ', 'As a ',
  'Would ', 'This means', 'That means', 'How ',
];

/**
 * Formats a conversational bot response into auto-paragraphed <p> elements
 * and renders them into `bubbleText`. HIGHLIGHT:$XXX tags are rendered inline
 * as teal spans via renderHighlightText().
 *
 * Falls back to plain text if the response is a defined/structured bubble.
 */
function formatBubbleText(bubbleText, text, raw) {
  if (isDefinedBubble(raw)) {
    // Defined bubble slipped into plain path — render safely as plain text
    bubbleText.textContent = stripMarkdownLinks(text);
    return;
  }

  // Split into sentences on ". " and "! "
  const marked = text.replace(/([.!])\s+/g, '$1\x00');
  const sentences = marked.split('\x00').map(s => s.trim()).filter(Boolean);

  // Group sentences into paragraphs:
  // Break when the NEXT sentence starts with a known paragraph-starter keyword.
  const paragraphs = [];
  let current = [];
  for (let i = 0; i < sentences.length; i++) {
    current.push(sentences[i]);
    const next = sentences[i + 1];
    if (next && PARA_STARTERS.some(starter => next.startsWith(starter))) {
      paragraphs.push(current.join(' '));
      current = [];
    }
  }
  if (current.length > 0) paragraphs.push(current.join(' '));

  // Fallback: if still one long block (>200 chars), force a split before the
  // last question sentence so the question always leads its own paragraph.
  if (paragraphs.length === 1 && text.length > 200) {
    const allMarked = text.replace(/([.!?])\s+/g, '$1\x00');
    const allSents  = allMarked.split('\x00').map(s => s.trim()).filter(Boolean);
    let lastQIdx = -1;
    for (let i = allSents.length - 1; i >= 0; i--) {
      if (allSents[i].endsWith('?')) { lastQIdx = i; break; }
    }
    if (lastQIdx > 0) {
      paragraphs.splice(0, 1,
        allSents.slice(0, lastQIdx).join(' '),
        allSents.slice(lastQIdx).join(' ')
      );
    }
  }

  // Render each paragraph — renderHighlightText handles HIGHLIGHT:$NNN inline
  bubbleText.innerHTML = '';
  paragraphs.forEach((paraText, i) => {
    const p = document.createElement('p');
    if (i < paragraphs.length - 1) p.style.marginBottom = '8px';
    renderHighlightText(p, paraText);
    bubbleText.appendChild(p);
  });
}

function finalizeMessage(wrap, msgRow, bubbleText, raw) {
  bubbleText.classList.remove('streaming');
  bubbleText.removeAttribute('aria-label');
  msgRow.querySelector('.bubble')?.classList.remove('streaming-bubble');

  const { phase, options, text, amount, listItems, advisor } = parseResponse(raw);
  if (phase) setPhase(phase);

  function done() {
    loading = false;
    setStopMode(false);
    lockInput(false);
    abortCtrl = null;
  }

  if (advisor) {
    // ── Advisor info bubble ──────────────────────────────────────────────────
    bubbleText.innerHTML = '';

    // Intro paragraph
    const intro = document.createElement('p');
    intro.textContent = 'Got it. UT Outpost advisors can walk you through the full application in person.';
    bubbleText.appendChild(intro);

    // "UT Outpost Details:" label
    const detailsLabel = document.createElement('p');
    detailsLabel.style.marginTop = '8px';
    detailsLabel.style.fontWeight = '600';
    detailsLabel.textContent = 'UT Outpost Details:';
    bubbleText.appendChild(detailsLabel);

    // Location — Google Maps link
    const locP = document.createElement('p');
    locP.style.marginTop = '4px';
    const locA = document.createElement('a');
    locA.href = 'https://maps.google.com/?q=Student+Services+Building+UT+Austin+Texas';
    locA.target = '_blank';
    locA.rel = 'noopener noreferrer';
    locA.textContent = 'Student Services Building (SSB), Ground Floor';
    locA.className = 'advisor-link';
    locP.appendChild(locA);
    bubbleText.appendChild(locP);

    // Website link
    const webP = document.createElement('p');
    webP.style.marginTop = '4px';
    const webA = document.createElement('a');
    webA.href = 'https://deanofstudents.utexas.edu/emergency/utoutpost.php';
    webA.target = '_blank';
    webA.rel = 'noopener noreferrer';
    webA.textContent = 'deanofstudents.utexas.edu/emergency/utoutpost.php';
    webA.className = 'advisor-link';
    webP.appendChild(webA);
    bubbleText.appendChild(webP);

    // Schedule prompt
    const schedP = document.createElement('p');
    schedP.style.marginTop = '8px';
    schedP.textContent = 'To schedule an appointment, you can:';
    bubbleText.appendChild(schedP);

    attachOptions(wrap, options, phase, true);
    scrollBottom();
    done();
    return;
  } else if (amount) {
    // ── Rich eligible result bubble ──────────────────────────────────────────
    // Store eligibility data for summary card
    snapData.monthlyBenefit    = amount;
    snapData.eligibilityStatus = 'very likely eligible';
    // Split on the blank line inserted where AMOUNT tag was
    const parts = text.split(/\n\n+/);
    const beforeAmount = stripMarkdownLinks((parts[0] || '').trim());
    const afterAmount  = stripMarkdownLinks((parts.slice(1).join('\n\n')).trim());

    bubbleText.innerHTML = '';

    // Para 1 — eligibility confirmation
    if (beforeAmount) {
      const p1 = document.createElement('p');
      p1.textContent = beforeAmount;
      bubbleText.appendChild(p1);
    }

    // Amount display: $298 / month
    const amountRow = document.createElement('div');
    amountRow.className = 'benefit-amount';
    amountRow.innerHTML = `<span class="benefit-amount-figure">$${amount}</span><span class="benefit-amount-unit"> / month</span>`;
    bubbleText.appendChild(amountRow);

    // Para 2 — explanation text
    if (afterAmount) {
      const p2 = document.createElement('p');
      p2.textContent = afterAmount;
      bubbleText.appendChild(p2);
    }

    // Numbered list
    if (listItems && listItems.length > 0) {
      const ol = document.createElement('ol');
      ol.className = 'benefit-list';
      listItems.forEach(item => {
        const li = document.createElement('li');
        li.textContent = item;
        ol.appendChild(li);
      });
      bubbleText.appendChild(ol);
    }

    // Sources chip + time inside bubble
    const eligibleSources = [
      { url: 'https://www.fns.usda.gov/snap/allotment/cola', title: 'USDA FNS Benefits', domain: 'fns.usda.gov', context: 'SNAP benefit allotment amounts by household size.' },
      { url: 'https://www.fns.usda.gov/snap/recipient/eligibility', title: 'USDA FNS Eligibility', domain: 'fns.usda.gov', context: 'SNAP eligibility requirements and income limits.' },
    ];
    const bubble = msgRow.querySelector('.bubble');
    const timeEl  = bubble.querySelector('.msg-time');
    const stack = document.createElement('div');
    stack.className = 'sources-stack';
    stack.appendChild(buildSourcesChip(eligibleSources));
    stack.appendChild(timeEl);
    bubble.appendChild(stack);
  } else if (text.includes('INELIGIBLE_SPLIT')) {
    // ── Ineligible result — three bubbles ────────────────────────────────────
    const splitIdx = text.indexOf('INELIGIBLE_SPLIT');
    const msg1 = text.slice(0, splitIdx).trim();

    // Detect ineligibility reason so the third bubble can show a context-aware option
    if (/meal plan|institution resident|50%|more than 10 meal/i.test(msg1)) {
      snapData.path = 'BLOCKED_MEAL_PLAN';

async function callAPI(retryCount = 0) {
  if (abortCtrl) abortCtrl.abort();
  abortCtrl = new AbortController();

  loading = true;
  lockInput(true);
  setStopMode(true);
  hideTyping();   // clear any existing typing bubble before showing a fresh one
  showTyping();

  const { wrap, msgRow, bubbleText } = createBotBubble();
  let raw        = '';
  let firstChunk = true;

  try {
    const response = await fetch('/api/chat', {
      method: 'POST',
      signal: abortCtrl.signal,
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ system: SYSTEM_PROMPT, messages: history }),
    });

    if (!response.ok) {
      let msg = `HTTP ${response.status}`;
      try { msg = (await response.json())?.error?.message || msg; } catch {}
      const retryable = [500, 503, 529].includes(response.status);
      const err = new Error(msg);
      err.retryable = retryable;
      throw err;
    }

    const reader  = response.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';
    let streamDone = false;

    try {
      while (true) {
        const { done, value } = await reader.read();
        if (done) break;

        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split('\n');
        buffer = lines.pop(); // keep incomplete line in buffer

        for (const line of lines) {
          if (!line.startsWith('data: ')) continue;
          const data = line.slice(6).trim();
          if (data === '[DONE]') continue;

          let parsed;
          try { parsed = JSON.parse(data); } catch { continue; }

          if (parsed.type === 'error') {
            const sseErr = new Error(parsed.error?.message || 'API error');
            sseErr.retryable = /overload|529|503/i.test(sseErr.message);
            throw sseErr;
          }

          // Safety: explicitly skip thinking deltas even if they slip past the server filter
          if (parsed.delta?.type === 'thinking_delta') continue;

          if (parsed.type === 'content_block_delta' && parsed.delta?.type === 'text_delta') {
            const token = parsed.delta.text;
            if (!token) continue;

            if (firstChunk) {
              hideTyping();
              chatArea.appendChild(wrap);
              firstChunk = false;
            }

            raw += token;
            // Safety guard: discard if thinking content leaked through as raw text
            if (/^\s*<thinking>/i.test(raw)) { raw = ''; continue; }
            // Strip all internal tags before updating the DOM so they never
            // appear as raw text in the bubble during streaming.
            bubbleText.textContent = stripMarkdownLinks(stripStreamingTags(raw));
            maybeScroll();
          }

          if (parsed.type === 'message_stop') {
            streamDone = true;
          }
        }
      }
    } finally {
      // Always release the reader — no-op if stream finished cleanly,
      // signals abort/cancel if the stream errored or was cut short.
      try { reader.cancel(); } catch {}
    }

    // Stream complete — finalize
    if (!firstChunk) {
      history.push({ role: 'assistant', content: raw });
      finalizeMessage(wrap, msgRow, bubbleText, raw);
    } else {
      // No content received
      hideTyping();
      loading = false;
      setStopMode(false);
      lockInput(false);
      abortCtrl = null;
    }

  } catch (err) {
    if (err.name === 'AbortError') {
      // User hit Stop — finalize whatever was received
      if (raw) {
        bubbleText.textContent = stripMarkdownLinks(stripStreamingTags(raw));
        history.push({ role: 'assistant', content: raw });
        finalizeMessage(wrap, msgRow, bubbleText, raw);
      } else {
        hideTyping();
        loading = false;
        setStopMode(false);
        lockInput(false);
        abortCtrl = null;
      }
    } else {
      const isRetryable = err.retryable || /overload|529|503|rate.?limit/i.test(err.message);
      if (isRetryable && retryCount < 3) {
        await new Promise(r => setTimeout(r, 2000));
        hideTyping();
        showTyping('Retrying...');
        await new Promise(r => setTimeout(r, 500)); // brief pause so label is visible
        callAPI(retryCount + 1);
        return;
      }
      hideTyping();
      const finalMsg = isRetryable
        ? 'The service is temporarily busy. Please wait a moment and try again.'
        : 'Something went wrong. Please try again.';
      const errWrap = document.createElement('div');
      errWrap.className = 'message bot';
      errWrap.innerHTML = `
        <div class="msg-row">
          <div class="avatar" aria-hidden="true">SB</div>
          <div class="bubble bubble-error" role="alert">
            <p class="bubble-text">${finalMsg}</p>
            <button class="retry-btn">Try again</button>
          </div>
        </div>`;
      errWrap.querySelector('.retry-btn').addEventListener('click', () => {
        errWrap.remove();
        callAPI();
      });
      chatArea.appendChild(errWrap);
      scrollBottom();
      loading = false;
      setStopMode(false);
      lockInput(false);
      abortCtrl = null;
    }
  }
}

// Cap conversation history to avoid unbounded memory growth.
// Always trims from the oldest end; the system prompt is sent separately
// and is never stored in history, so no context is lost.
function trimHistory(maxMessages = 50) {
  if (history.length > maxMessages) {
    history = history.slice(history.length - maxMessages);
  }
}

async function handleUserMessage(text) {
  if (loading) return;

  // Track conversation data for summary card
  trackSnapData(text);

  addMessage('user', text);

  // Intercept "I'll apply later" — render summary card, skip API
  if (text === "I'll apply later") {
    history.push({ role: 'user', content: text });
    renderSummaryBubble();
    return;
  }

  // Intercept "Start applying on TexasBenefits.com" — show pre-apply bubble, skip API
  if (text === 'Start applying on TexasBenefits.com') {
    history.push({ role: 'user', content: text });
    showTyping();
    setTimeout(() => {
      hideTyping();
      const { wrap: wP, msgRow: mrP, bubbleText: btP } = createBotBubble();
      btP.innerHTML = '';

      const p1 = document.createElement('p');
      p1.textContent = 'YourTexasBenefits.com will open in a new tab.';
      btP.appendChild(p1);

      const p2 = document.createElement('p');
      p2.style.marginTop = '0.75em';
      p2.textContent = 'Before you go, a few things to keep in mind:';
      btP.appendChild(p2);

      const ol = document.createElement('ol');
      ol.className = 'apply-checklist';
      [
        'The application takes about 30\u201360 minutes to complete',
        "You\u2019ll be asked about your income, household, and expenses",
        'Make sure you have your documents ready before you start',
      ].forEach(item => {
        const li = document.createElement('li');
        li.textContent = item;
        ol.appendChild(li);
      });
      btP.appendChild(ol);

      const ctaBtn = document.createElement('a');
      ctaBtn.className = 'apply-cta-btn';
      ctaBtn.textContent = 'Go to YourTexasBenefits.com';
      ctaBtn.href = 'https://yourtexasbenefits.com';
      ctaBtn.target = '_blank';
      ctaBtn.rel = 'noopener noreferrer';
      btP.appendChild(ctaBtn);

      btP.classList.remove('streaming');
      btP.removeAttribute('aria-label');
      mrP.querySelector('.bubble')?.classList.remove('streaming-bubble');
      chatArea.appendChild(wP);
      scrollBottom();
    }, 800);
    return;
  }

  if (pendingFile) {
    const content = [
      { type: pendingFile.type, source: { type: 'base64', media_type: pendingFile.media_type, data: pendingFile.data } },
      { type: 'text', text: text || '(attached file)' }
    ];
    history.push({ role: 'user', content });
    pendingFile = null;
    renderFilePreview();
  } else {
    history.push({ role: 'user', content: text });
  }

  trimHistory();
  await callAPI();
}

async function sendMessage() {
  const text = msgInput.value.trim();
  if ((!text && !pendingFile) || loading) return;
  msgInput.value = '';
  resizeTextarea();
  await handleUserMessage(text);
}

function lockInput(locked) {
  msgInput.disabled = locked;
  sendBtn.disabled  = locked || (!msgInput.value.trim() && !pendingFile);
}

function resizeTextarea() {
  msgInput.style.height = 'auto';
  msgInput.style.height = Math.min(msgInput.scrollHeight, 100) + 'px';
  sendBtn.disabled = (!msgInput.value.trim() && !pendingFile) || loading;
}

msgInput.addEventListener('input',   resizeTextarea);
msgInput.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});
sendBtn.addEventListener('click', () => {
  if (loading && abortCtrl) {
    // Stop streaming
    abortCtrl.abort();
  } else {
    sendMessage();
  }
});

// ── Voice Input (Web Speech API + Web Audio API) ───────────────────────────────
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
const voiceStopBtn = document.getElementById('voiceStopBtn');
const voiceTimer   = document.getElementById('voiceTimer');

if (SpeechRecognition) {
  const recognition = new SpeechRecognition();
  recognition.lang = 'en-US';
  recognition.interimResults = true;
  recognition.continuous = false;

  let isRecording   = false;
  let timerInterval = null;
  let timerSeconds  = 0;

  // Web Audio API state
  let audioCtx      = null;
  let analyser      = null;
  let micStream     = null;
  let animRafId     = null;
  const dataArray   = new Uint8Array(256);

  // Active bar elements (bars 2, 3, 4 — 0-indexed: 1, 2, 3)
  const voiceBars = micBtn.querySelectorAll('.vbar');
  const activeBars = [voiceBars[1], voiceBars[2], voiceBars[3]];
  const multipliers = [1.0, 0.8, 0.6];

  function startTimer() {
    timerSeconds = 0;
    voiceTimer.textContent = '0:00';
    timerInterval = setInterval(() => {
      timerSeconds++;
      const m = Math.floor(timerSeconds / 60);
      const s = String(timerSeconds % 60).padStart(2, '0');
      voiceTimer.textContent = `${m}:${s}`;
    }, 1000);
  }

  function stopTimer() {
    clearInterval(timerInterval);
    timerInterval = null;
    timerSeconds  = 0;
    voiceTimer.textContent = '0:00';
  }

  function resetBars() {
    activeBars.forEach(bar => {
      bar.style.transform = 'scaleY(0.3)';
      bar.style.backgroundColor = '#d9d9d9';
    });
  }

  function animateBars() {
    if (!analyser) return;
    analyser.getByteFrequencyData(dataArray);

    // Average the lower frequency bins for a voice-appropriate reading
    let sum = 0;
    const binCount = 32;
    for (let i = 0; i < binCount; i++) sum += dataArray[i];
    const avg = sum / binCount;

    const SILENCE_THRESHOLD = 10;
    if (avg < SILENCE_THRESHOLD) {
      resetBars();
    } else {
      // Map avg (0-255) to scale (0.3-1.0)
      const scale = 0.3 + (avg / 255) * 0.7;
      activeBars.forEach((bar, i) => {
        const barScale = Math.min(scale * multipliers[i], 1.0);
        bar.style.transform = `scaleY(${Math.max(barScale, 0.3)})`;
        bar.style.backgroundColor = '#1c7a74';
      });
    }

    animRafId = requestAnimationFrame(animateBars);
  }

  async function startAudio() {
    try {
      micStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
      audioCtx  = new (window.AudioContext || window.webkitAudioContext)();
      analyser  = audioCtx.createAnalyser();
      analyser.fftSize = 512;
      analyser.smoothingTimeConstant = 0.6;
      const source = audioCtx.createMediaStreamSource(micStream);
      source.connect(analyser);
      animateBars();
    } catch (e) {
      // Microphone permission denied — bars stay static, recognition still works
    }
  }

  function stopAudio() {
    if (animRafId) { cancelAnimationFrame(animRafId); animRafId = null; }
    if (micStream) { micStream.getTracks().forEach(t => t.stop()); micStream = null; }
    if (audioCtx)  { audioCtx.close(); audioCtx = null; }
    analyser = null;
    resetBars();
  }

  function enterVoiceMode() {
    micBtn.setAttribute('aria-label', 'Stop recording');
    // Hide attach button, then expand pill
    attachBtn.classList.add('voice-hidden');
    micBtn.classList.add('recording');
    startTimer();
    startAudio();
  }

  function exitVoiceMode() {
    micBtn.classList.remove('recording');
    micBtn.setAttribute('aria-label', 'Voice input');
    stopTimer();
    stopAudio();
    // Fade attach button back in after pill shrinks
    setTimeout(() => {
      attachBtn.classList.remove('voice-hidden');
    }, 200);
    // Fade transcript in
    msgInput.style.opacity = '0';
    requestAnimationFrame(() => {
      msgInput.style.transition = 'opacity 200ms';
      msgInput.style.opacity = '1';
      setTimeout(() => { msgInput.style.transition = ''; }, 250);
    });
  }

  micBtn.addEventListener('click', () => {
    if (isRecording) { recognition.stop(); return; }
    recognition.start();
  });

  voiceStopBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    if (isRecording) recognition.stop();
  });

  recognition.addEventListener('start', () => {
    isRecording = true;
    enterVoiceMode();
  });

  recognition.addEventListener('result', (e) => {
    msgInput.value = Array.from(e.results).map(r => r[0].transcript).join('');
    resizeTextarea();
  });

  recognition.addEventListener('end', () => {
    isRecording = false;
    exitVoiceMode();
  });

  recognition.addEventListener('error', () => {
    isRecording = false;
    exitVoiceMode();
  });
} else {
  micBtn.style.display = 'none';
}

// ── File Upload ──────────────────────────────────────────────────────────────
attachBtn.addEventListener('click', () => fileInput.click());

fileInput.addEventListener('change', () => {
  const file = fileInput.files[0];
  if (!file) return;
  fileInput.value = '';
  const reader = new FileReader();
  reader.onload = () => {
    const base64 = reader.result.split(',')[1];
    const isImage = file.type.startsWith('image/');
    pendingFile = {
      type: isImage ? 'image' : 'document',
      media_type: file.type,
      data: base64,
      name: file.name,
      previewUrl: isImage ? reader.result : null
    };
    renderFilePreview();
  };
  reader.readAsDataURL(file);
});

function renderFilePreview() {
  filePreview.innerHTML = '';
  if (!pendingFile) { resizeTextarea(); return; }

  const item = document.createElement('div');
  item.className = 'file-preview-item';
  if (pendingFile.previewUrl) {
    item.innerHTML = `<img src="${pendingFile.previewUrl}" alt="${esc(pendingFile.name)}">`;
  } else {
    item.innerHTML = `<span class="material-icons" style="font-size:20px">description</span><span>${esc(pendingFile.name)}</span>`;
  }

  const removeBtn = document.createElement('button');
  removeBtn.className = 'file-preview-remove';
  removeBtn.innerHTML = '<span class="material-icons" style="font-size:14px">close</span>';
  removeBtn.addEventListener('click', () => {
    pendingFile = null;
    renderFilePreview();
  });
  item.appendChild(removeBtn);
  filePreview.appendChild(item);
  resizeTextarea();
}

function renderActionCards(wrap) {
